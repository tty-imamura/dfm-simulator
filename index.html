<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0e1a">
<title>仮想物理ラボ — 仮定物理法則シミュレータ</title>
<style>
  :root{
    --bg:#0b0e1a; --panel:#141830; --panel2:#1c2142; --line:#2a3060;
    --fg:#dfe4ff; --dim:#8b93c8; --acc:#5b8cff; --hot:#ff9d45; --err:#ff6b7a; --ok:#59d499;
    --sab: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    overscroll-behavior:none;}
  #app{display:flex;flex-direction:column;height:100%;}
  header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--panel);
    border-bottom:1px solid var(--line);flex:0 0 auto;padding-top:calc(8px + env(safe-area-inset-top,0px));}
  header .title{font-weight:700;font-size:15px;white-space:nowrap;}
  select,button,input,textarea{font:inherit;color:var(--fg);}
  select{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px 10px;min-height:44px;}
  #presetSelect{flex:1;min-width:0;}
  #canvasWrap{position:relative;flex:1 1 auto;min-height:120px;background:#05070f;}
  canvas#cv{position:absolute;inset:0;width:100%;height:100%;touch-action:none;display:block;}
  #hud{position:absolute;left:8px;top:6px;font-size:11px;color:var(--dim);pointer-events:none;
    text-shadow:0 1px 2px #000;line-height:1.5;white-space:pre;}
  #notice{position:absolute;left:50%;top:12px;transform:translateX(-50%);max-width:92%;
    background:rgba(20,24,48,.92);border:1px solid var(--line);border-radius:10px;
    padding:8px 12px;font-size:12px;display:none;pointer-events:none;text-align:center;}
  #transport{display:flex;gap:8px;padding:8px 12px;background:var(--panel);
    border-top:1px solid var(--line);flex:0 0 auto;align-items:center;}
  #transport button{flex:1;min-height:46px;border-radius:12px;border:1px solid var(--line);
    background:var(--panel2);font-size:14px;font-weight:600;touch-action:manipulation;}
  #transport button:active{background:#26305e;}
  #btnPlay.playing{background:#20315f;border-color:var(--acc);}
  #speedSel{flex:0 0 84px;}
  nav#tabs{display:flex;background:var(--panel);border-top:1px solid var(--line);flex:0 0 auto;}
  nav#tabs button{flex:1;min-height:44px;background:none;border:none;border-top:2px solid transparent;
    color:var(--dim);font-size:12.5px;font-weight:600;touch-action:manipulation;}
  nav#tabs button.on{color:var(--fg);border-top-color:var(--acc);background:var(--panel2);}
  #panel{flex:0 0 auto;max-height:42vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
    background:var(--panel2);border-top:1px solid var(--line);
    padding:10px 12px calc(10px + var(--sab));display:none;}
  #panel.open{display:block;}
  .tabPage{display:none;} .tabPage.on{display:block;}
  .group{margin:6px 0 14px;}
  .group>h3{margin:4px 0 8px;font-size:12px;color:var(--dim);font-weight:700;letter-spacing:.06em;}
  .prow{display:flex;align-items:center;gap:10px;margin:7px 0;}
  .prow label{flex:0 0 118px;font-size:12px;color:var(--fg);}
  .prow input[type=range]{flex:1;min-width:0;accent-color:var(--acc);height:30px;}
  .prow .val{flex:0 0 62px;text-align:right;font-size:12px;color:var(--acc);font-variant-numeric:tabular-nums;}
  .prow input.valIn{flex:0 0 74px;width:74px;min-height:36px;padding:4px 6px;text-align:right;
    font-size:12.5px;color:var(--acc);background:var(--panel);border:1px solid var(--line);
    border-radius:8px;font-variant-numeric:tabular-nums;}
  .prow input[type=checkbox]{width:22px;height:22px;accent-color:var(--acc);}
  .btn{display:inline-block;border:1px solid var(--line);background:var(--panel);
    border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;touch-action:manipulation;}
  .btn:active{background:#26305e;}
  .btn.primary{background:#24407e;border-color:var(--acc);}
  .btn.danger{color:var(--err);}
  .btn[disabled]{opacity:.45;}
  input[type=text],input[type=password],textarea{width:100%;background:var(--panel);
    border:1px solid var(--line);border-radius:10px;padding:10px;min-height:44px;font-size:14px;}
  textarea{min-height:74px;resize:vertical;}
  .note{font-size:11.5px;color:var(--dim);margin:6px 0;line-height:1.6;}
  .saveItem,.customItem{border:1px solid var(--line);border-radius:10px;background:var(--panel);
    padding:8px 10px;margin:8px 0;}
  .saveItem .name{font-weight:700;font-size:13.5px;}
  .saveItem .meta{font-size:11px;color:var(--dim);margin:2px 0;}
  .saveItem .comment{font-size:12px;margin:4px 0;white-space:pre-wrap;}
  .rowBtns{display:flex;gap:8px;margin-top:6px;}
  .rowBtns .btn{flex:1;text-align:center;padding:8px;}
  #aiStatus{font-size:12.5px;margin:8px 0;line-height:1.6;white-space:pre-wrap;}
  #aiStatus.err{color:var(--err);} #aiStatus.ok{color:var(--ok);}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--dim);
    border-top-color:var(--acc);border-radius:50%;animation:sp 1s linear infinite;vertical-align:-2px;}
  @keyframes sp{to{transform:rotate(360deg)}}
  #helpBody{font-size:12.5px;line-height:1.75;}
  #helpBody h4{margin:12px 0 4px;font-size:13px;color:var(--acc);}
  #helpBody p{margin:4px 0;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="title">仮想物理ラボ</div>
    <select id="presetSelect" aria-label="シミュレーション選択"></select>
  </header>
  <div id="canvasWrap">
    <canvas id="cv"></canvas>
    <div id="hud"></div>
    <div id="notice"></div>
  </div>
  <div id="transport">
    <button id="btnReset">⏮ 初めから</button>
    <button id="btnPlay">▶ 実行</button>
    <select id="speedSel" aria-label="速度">
      <option value="0.25">×0.25</option><option value="0.5">×0.5</option>
      <option value="1" selected>×1</option><option value="2">×2</option>
      <option value="4">×4</option><option value="8">×8</option>
    </select>
  </div>
  <nav id="tabs">
    <button data-tab="help">説明</button>
    <button data-tab="params">パラメータ</button>
    <button data-tab="saves">セーブ</button>
    <button data-tab="ai">AI追加</button>
  </nav>
  <section id="panel">
    <div class="tabPage" id="page-help"><div id="helpBody"></div></div>
    <div class="tabPage" id="page-params">
      <div id="paramRows"></div>
      <div class="rowBtns">
        <button class="btn" id="btnParamDefault">プリセット既定値に戻す</button>
      </div>
      <p class="note">※ 物理パラメータは実行中いつでも反映されます。粒子の初期配置・個数はプリセット選択または「⏮ 初めから」で反映されます。</p>
    </div>
    <div class="tabPage" id="page-saves">
      <div class="group"><h3>現在のパラメータを保存</h3>
        <input type="text" id="saveName" placeholder="名前(例: 環が安定する設定)">
        <div style="height:8px"></div>
        <textarea id="saveComment" placeholder="コメント(例: muFを0.8にすると円形化が速い)"></textarea>
        <div class="rowBtns"><button class="btn primary" id="btnSave">保存</button></div>
      </div>
      <div class="group"><h3>保存一覧</h3><div id="saveList"></div></div>
      <div class="group"><h3>バックアップ</h3>
        <div class="rowBtns">
          <button class="btn" id="btnExport">エクスポート(コピー)</button>
          <button class="btn" id="btnImport">インポート</button>
        </div>
        <textarea id="ioArea" placeholder="エクスポートJSONの表示 / 貼り付けてインポート"></textarea>
      </div>
    </div>
    <div class="tabPage" id="page-ai">
      <div class="group"><h3>Claude APIキー</h3>
        <input type="password" id="apiKey" placeholder="sk-ant-...">
        <div class="rowBtns"><button class="btn" id="btnKeySave">キーを保存</button></div>
        <p class="note">キーは<b>この端末のlocalStorageにのみ</b>保存され、送信先は api.anthropic.com だけです。</p>
        <div class="prow"><label>モデル</label>
          <select id="aiModel" style="flex:1">
            <option value="claude-haiku-4-5" selected>Haiku 4.5(推奨・低コスト)</option>
            <option value="claude-sonnet-5">Sonnet 5(高品質)</option>
          </select></div>
      </div>
      <div class="group"><h3>新しいシミュレーションを生成</h3>
        <textarea id="aiPrompt" placeholder="例: 3つの恒星が絡み合う三体問題。まわりに塵の環も欲しい"></textarea>
        <div class="rowBtns"><button class="btn primary" id="btnGenerate">生成する</button></div>
        <div id="aiStatus"></div>
      </div>
      <div class="group"><h3>生成済みプリセット</h3><div id="customList"></div></div>
    </div>
  </section>
</div>
<script>
"use strict";
/* =====================================================================
 * 仮想物理ラボ — 仮定物理法則シミュレータ
 * 物理式は docs/PHYSICS.md の E1〜E11 を実装(式番号をコメントに付す)
 * v1.1 (2026-07-15): A13相互性(E5′/E6′/E9/E10′で保存則を厳密化)、
 * A11光の媒質随伴(E8′)、A12放射(E11)を反映。docs/DERIVATIONS.md §0〜§1 が正。
 * v1.2 (2026-07-15): 熱・放射系サンプル6種+スペクトルオーバーレイ(付録C)。
 * v1.3 (2026-07-15): 理想気体・摩擦熱と熱伝導・星の形成の3サンプル(付録D)。
 * v1.4 (2026-07-15): サンプルラインナップ改訂(付録E)— 3グループ化UI、
 * galaxy/protodisk 初期値適切化(塊化・中心崩壊の抑制)、雪線サンプル新設。
 * v1.5 (2026-07-16): 整合性修正(付録F=HANDOFF_FIX_V15.md)— E1′(Plummer型)で
 * E4=G∇W が厳密成立(L5解消)、E9すべり散逸・E10′同期散逸を radE に計上(A12′、
 * 第一法則の完全閉性)、検証 V9/V10/V11 追加、phase 統制実験化、starform 改名。
 * ===================================================================== */

// ===== ユーティリティ =====
const $ = (s)=>document.querySelector(s);
const clamp = (v,a,b)=>v<a?a:(v>b?b:v);
function mulberry32(seed){ let a=seed>>>0; return function(){ a|=0; a=(a+0x6D2B79F5)|0;
  let t=Math.imul(a^(a>>>15),1|a); t=(t+Math.imul(t^(t>>>7),61|t))^t;
  return ((t^(t>>>14))>>>0)/4294967296; }; }
function hashStr(s){ let h=2166136261; for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);} return h>>>0; }
const fmt = (v)=> Math.abs(v)>=100?v.toFixed(0):Math.abs(v)>=10?v.toFixed(1)
  :Math.abs(v)>=0.1||v===0?v.toFixed(2):v.toFixed(4);

// ===== 物理パラメータ定義(PHYSICS.md §5 既定パラメータ表) =====
const DEFAULT_PHYSICS = { G:1, D0:2, kFrame:1, q:2, kRep:1, muF:0.5, gammaN:0.4,
  kappaS:0.05, Kt:60, cLight:60, bM:1, etaRad:0, pRad:4,
  radiusScale:1.2, softening:2, timeScale:1 };
// v1.7: kLens は廃止(E8R で屈折率は n=e^{2W/Kt} に統一。旧セーブの kLens は受理して無視)
const DT = 0.016, SUBSTEPS = 2;          // dt/substeps はアプリ管理(LLMへは非公開)
const N_CAP = 600;                        // 粒子総数上限
const RAY_MASS_MIN = 40;                  // 光線を曲げる最小質量(性能のための近似)

// パラメータUI定義。mode:"log"=対数スライダー(桁をまたぐ量の微調整用。
// スライダー範囲外の値(0を含む)は隣の数値入力欄から直接設定できる)
const PARAM_DEFS = [
  {key:"G",     label:"重力 G",              mode:"log", lo:0.01,   hi:20,   group:"法則"},
  {key:"D0",    label:"背景決定力 D₀",       mode:"log", lo:0.05,   hi:200,  group:"法則"},
  {key:"kFrame",label:"空間引きずり kFrame", mode:"lin", lo:0, hi:1, step:0.01, group:"法則"},
  {key:"q",     label:"引きずり減衰 q",      mode:"lin", lo:0.5, hi:4, step:0.05, group:"法則"},
  {key:"kRep",  label:"スピン斥力 kRep",     mode:"lin", lo:0, hi:5, step:0.05, group:"法則"},
  {key:"muF",   label:"摩擦→スピン変換 muF", mode:"lin", lo:0, hi:1, step:0.01, group:"法則"},
  {key:"gammaN",label:"衝突減衰 γn",         mode:"lin", lo:0, hi:1, step:0.01, group:"法則"},
  {key:"kappaS",label:"スピン拡散 κs",       mode:"lin", lo:0, hi:0.5, step:0.005, group:"法則"},
  {key:"Kt",    label:"時空係数 Kt(時間・光)", mode:"log", lo:1, hi:2000, group:"法則"},
  {key:"cLight",label:"光速 c₀",             mode:"log", lo:5, hi:1000, group:"法則"},
  {key:"bM",    label:"ウィーン定数 b_m",    mode:"log", lo:0.01, hi:100, group:"法則"},
  {key:"etaRad",label:"放射冷却 η_rad",      mode:"log", lo:0.000001, hi:0.1, group:"法則"},
  {key:"pRad",  label:"放射指数 p",          mode:"lin", lo:1, hi:6, step:0.5, group:"法則"},
  {key:"radiusScale",label:"粒子半径スケール", mode:"lin", lo:0.2, hi:4, step:0.02, group:"シミュレーション"},
  {key:"softening",  label:"ソフトニング ε",  mode:"lin", lo:0.5, hi:10, step:0.1, group:"シミュレーション"},
  {key:"timeScale",  label:"時間倍率",        mode:"log", lo:0.1, hi:16, group:"シミュレーション"},
];
function sliderPosToVal(def,pos){
  if(def.mode==="log") return def.lo*Math.exp((pos/1000)*Math.log(def.hi/def.lo));
  return pos;
}
function valToSliderPos(def,v){
  if(def.mode==="log"){
    if(!(v>def.lo)) return 0;
    if(v>=def.hi) return 1000;
    return Math.round(1000*Math.log(v/def.lo)/Math.log(def.hi/def.lo));
  }
  return v;
}

// バリデータのクランプ値域(HANDOFF_RUNTIME_LLM.md と同一)
// kLens は v1.7 で廃止。旧セーブ・旧AIプリセット互換のため受理のみ(エンジンは参照しない)
const CLAMPS = { G:[0,100], D0:[0,1000], kFrame:[0,1], q:[0.5,4], kRep:[0,20], muF:[0,1],
  gammaN:[0,1], kappaS:[0,2], Kt:[1,10000], kLens:[0,1],
  cLight:[1,10000], bM:[0.001,1000], etaRad:[0,1], pRad:[1,6], radiusScale:[0.2,5],
  softening:[0.5,20], timeScale:[0.1,16] };

// ===== 内蔵プリセット(スキーマは docs/HANDOFF_IMPLEMENTATION.md §契約1) =====
const BUILTIN_PRESETS = [
// ===== グループ: 空間と光(付録E E4) =====
{ id:"mach", name:"マッハのバケツ", emoji:"🪣", group:"空間と光",
  description:"重い回転リングが内側の空間ごと引きずり、静止していた粒子が回り始める(A4/A5/T2)。D₀(遠方宇宙の決定力)を上げると引きずりが弱まる=空間が安定する(T1と対比)。",
  camera:{scale:220}, world:{boundary:"none",size:0},
  physics:{G:0.02, D0:0.5, timeScale:2},
  bodies:[
    {type:"ring", n:14, cx:0,cy:0, rIn:150,rOut:150, mMin:80,mMax:80,
     spinMin:0.5,spinMax:0.5, vMode:"omega", aroundMass:0, omega:0.012, vNoise:0, direction:1, pinned:true},
    {type:"disk", n:40, cx:0,cy:0, radius:80, mMin:0.5,mMax:0.5,
     spinMin:0,spinMax:0, vMode:"none", aroundMass:0, vScale:0, direction:1}
  ],
  overlays:{rotationCurve:false,tempHistogram:false,field:false} },

{ id:"galaxy", name:"銀河の回転曲線", emoji:"🌌", group:"空間と光",
  description:"円盤銀河。初めは星々がケプラー回転(グラフの点線と一致)しているが、空間の引きずり(kFrame=1)が内側の回転を外へ伝え、回転曲線が平坦化していく(T4)。kFrameを0にすると起きない。右下のグラフ(実線=実測、点線=ケプラー予想)に注目。",
  camera:{scale:300}, world:{boundary:"none",size:0},
  physics:{D0:1, muF:0.02, gammaN:0.05, kRep:1.0, softening:4, timeScale:4},
  bodies:[
    {type:"single", m:600, x:0,y:0, vx:0,vy:0, spin:0.05, pinned:false},
    {type:"disk", n:380, cx:0,cy:0, radius:260, mMin:0.5,mMax:1.2,
     spinMin:0,spinMax:0, vMode:"kepler", aroundMass:600, vScale:1.05, direction:1}
  ],
  overlays:{rotationCurve:true,tempHistogram:false,field:false} },

{ id:"lensing", name:"重力レンズと時間", emoji:"💡", group:"空間と光",
  description:"左から飛ぶ光線が、決定力の高い(=時間の遅い)領域で屈折して曲がる(A7′/T5)。v1.7: 時間の遅れと光の屈折は単一のψ=W/Ktで統一(E7R/E8R)— Ktを下げると両方が同時に強まる。強い場では光が捕まって周回する(光子球の類似)。背景の色は決定力Wの強さ。粒子をタップすると固有時計(τ/t)が見える。",
  camera:{scale:300}, world:{boundary:"none",size:0},
  physics:{Kt:150, timeScale:1},
  bodies:[
    {type:"single", m:1500, x:0,y:0, vx:0,vy:0, spin:0.5, pinned:true},
    {type:"single", m:500, x:120,y:-90, vx:0,vy:0, spin:0, pinned:true}
  ],
  rays:{n:26, spread:0.85},
  overlays:{rotationCurve:false,tempHistogram:false,field:true} },

{ id:"spectrum", name:"スピンとスペクトル", emoji:"🌈", group:"空間と光",
  description:"同じ質量でスピンだけが違う6つの質点。温度T=Is²が放射のピーク波長λ=b_m/Tを決める(A12ウィーン則)。光度はΛ∝T⁴なので高スピンの星から先に冷え、右下のスペクトルの輝線が長波長側へ動く。粒子をタップするとλが見える。",
  camera:{scale:260}, world:{boundary:"none",size:0},
  physics:{G:0, kFrame:0, kRep:0, muF:0, gammaN:0, kappaS:0, etaRad:7e-11, pRad:4, timeScale:1},
  bodies:[
    {type:"single", m:8, x:-200,y:0, vx:0,vy:0, spin:0.6, pinned:false},
    {type:"single", m:8, x:-120,y:0, vx:0,vy:0, spin:1.2, pinned:false},
    {type:"single", m:8, x:-40, y:0, vx:0,vy:0, spin:1.8, pinned:false},
    {type:"single", m:8, x:40,  y:0, vx:0,vy:0, spin:2.4, pinned:false},
    {type:"single", m:8, x:120, y:0, vx:0,vy:0, spin:3.0, pinned:false},
    {type:"single", m:8, x:200, y:0, vx:0,vy:0, spin:3.6, pinned:false}
  ],
  overlays:{rotationCurve:false,tempHistogram:false,field:false,spectrum:true} },

// ===== グループ: 熱の実験室(付録E E4) =====
{ id:"idealgas", name:"理想気体の自由膨張", emoji:"🎈", group:"熱の実験室",
  description:"散逸を全て切った「理想気体」。接触は弾性ばね、圧力はスピン斥力 F∝T(P∝nT の類似)。中央の高密度の塊が自由膨張して箱に一様に満ちるが、温度(スピン)は厳密に不変——ジュールの自由膨張。右下の左右平均温度は等しいまま動かない。",
  camera:{scale:200}, world:{boundary:"box",size:160},
  physics:{G:0, D0:50, kFrame:0, kRep:2, muF:0, gammaN:0, kappaS:0, etaRad:0, timeScale:2},
  bodies:[
    {type:"disk", n:200, cx:0,cy:0, radius:55, mMin:0.5,mMax:0.5,
     spinMin:2.5,spinMax:2.5, vMode:"random", aroundMass:0, vScale:6, direction:1}
  ],

// ===== プリセット・バリデータ(LLM出力/インポートの検証。構造NG=エラー、値域外=クランプ) =====
function isNum(v){ return typeof v==="number" && isFinite(v); }
function validatePreset(obj){
  const errors=[], warnings=[];
  const bad=(m)=>{errors.push(m);};
  if(!obj || typeof obj!=="object" || Array.isArray(obj)) return {ok:false, errors:["ルートがオブジェクトではありません"], warnings};
  const p = JSON.parse(JSON.stringify(obj)); // 破壊防止コピー
  if(typeof p.name!=="string" || !p.name.trim()) bad("name(文字列)が必要です");
  else p.name=p.name.trim().slice(0,30);
  if(typeof p.description!=="string") bad("description(文字列)が必要です");
  else p.description=p.description.slice(0,200);
  if(p.emoji!==undefined && typeof p.emoji!=="string") bad("emojiは文字列");
  if(!p.camera || !isNum(p.camera.scale)) bad("camera.scale(数値)が必要です");
  else p.camera={scale:clamp(p.camera.scale,20,3000)};
  const BOUND=["none","box","circle"];
  if(!p.world || BOUND.indexOf(p.world.boundary)<0 || !isNum(p.world.size)) bad("world.boundary/sizeが不正です");
  else p.world={boundary:p.world.boundary, size:clamp(p.world.size,0,5000)};
  // physics: 部分指定を許容し、既定値へマージ + クランプ
  const ph = Object.assign({}, DEFAULT_PHYSICS);
  if(p.physics!==undefined){
    if(typeof p.physics!=="object" || Array.isArray(p.physics)) bad("physicsはオブジェクト");
    else for(const k of Object.keys(p.physics)){
      if(!(k in CLAMPS)){ warnings.push("physicsの未知キー "+k+" を無視"); continue; }
      if(!isNum(p.physics[k])){ bad("physics."+k+" が数値ではありません"); continue; }
      const c=CLAMPS[k], v=clamp(p.physics[k],c[0],c[1]);
      if(v!==p.physics[k]) warnings.push("physics."+k+" を値域に修正");
      ph[k]=v;
    }
  }
  p.physics=ph;
  // bodies
  if(!Array.isArray(p.bodies)) bad("bodies(配列)が必要です");
  else {
    const CO=(v)=>clamp(v,-5000,5000), LEN=(v)=>clamp(v,0,5000), MASS=(v)=>clamp(v,0.01,5000),
          VEL=(v)=>clamp(v,-50,50), SPN=(v)=>clamp(v,-20,20);
    const out=[];
    p.bodies.forEach((b,idx)=>{
      const at="bodies["+idx+"]";
      if(!b||typeof b!=="object"){ bad(at+" がオブジェクトではありません"); return; }
      const t=b.type;
      const needNum=(keys)=>{ for(const k of keys){ if(!isNum(b[k])){ bad(at+"."+k+" が数値ではありません"); return false; } } return true; };
      if(t==="single"){
        if(!needNum(["m","x","y","vx","vy","spin"])) return;
        if(typeof b.pinned!=="boolean"){ bad(at+".pinned(boolean)が必要"); return; }
        out.push({type:"single", m:MASS(b.m), x:CO(b.x), y:CO(b.y), vx:VEL(b.vx), vy:VEL(b.vy), spin:SPN(b.spin), pinned:b.pinned});
      } else if(t==="ring"){
        if(!needNum(["n","cx","cy","rIn","rOut","mMin","mMax","spinMin","spinMax","aroundMass","omega","vNoise"])) return;
        if(["kepler","omega","none"].indexOf(b.vMode)<0){ bad(at+".vMode が不正"); return; }
        if(b.direction!==1 && b.direction!==-1){ bad(at+".direction は 1 か -1"); return; }
        if(typeof b.pinned!=="boolean"){ bad(at+".pinned(boolean)が必要"); return; }
        out.push({type:"ring", n:clamp(Math.round(b.n),0,N_CAP), cx:CO(b.cx), cy:CO(b.cy),
          rIn:LEN(Math.min(b.rIn,b.rOut)), rOut:LEN(Math.max(b.rIn,b.rOut)),
          mMin:MASS(Math.min(b.mMin,b.mMax)), mMax:MASS(Math.max(b.mMin,b.mMax)),
          spinMin:SPN(Math.min(b.spinMin,b.spinMax)), spinMax:SPN(Math.max(b.spinMin,b.spinMax)),
          vMode:b.vMode, aroundMass:clamp(b.aroundMass,0,5000), omega:clamp(b.omega,-2,2),
          vNoise:clamp(b.vNoise,0,1), direction:b.direction, pinned:b.pinned});
      } else if(t==="disk"){
        if(!needNum(["n","cx","cy","radius","mMin","mMax","spinMin","spinMax","aroundMass","vScale"])) return;
        if(["kepler","rigid","flat","random","none"].indexOf(b.vMode)<0){ bad(at+".vMode が不正"); return; }
        if(b.direction!==1 && b.direction!==-1){ bad(at+".direction は 1 か -1"); return; }
        out.push({type:"disk", n:clamp(Math.round(b.n),0,N_CAP), cx:CO(b.cx), cy:CO(b.cy), radius:LEN(b.radius),
          mMin:MASS(Math.min(b.mMin,b.mMax)), mMax:MASS(Math.max(b.mMin,b.mMax)),
          spinMin:SPN(Math.min(b.spinMin,b.spinMax)), spinMax:SPN(Math.max(b.spinMin,b.spinMax)),
          vMode:b.vMode, aroundMass:clamp(b.aroundMass,0,5000), vScale:clamp(b.vScale,0,50), direction:b.direction});
      } else if(t==="box"){
        if(!needNum(["n","cx","cy","w","h","mMin","mMax","spinMin","spinMax","vScale"])) return;
        out.push({type:"box", n:clamp(Math.round(b.n),0,N_CAP), cx:CO(b.cx), cy:CO(b.cy), w:LEN(b.w), h:LEN(b.h),
          mMin:MASS(Math.min(b.mMin,b.mMax)), mMax:MASS(Math.max(b.mMin,b.mMax)),
          spinMin:SPN(Math.min(b.spinMin,b.spinMax)), spinMax:SPN(Math.max(b.spinMin,b.spinMax)),
          vScale:clamp(b.vScale,0,50)});
      } else bad(at+".type が不正です("+String(t)+")");
    });
    // 粒子総数のクランプ(比例縮小)
    let total=0; out.forEach(b=>{ total += (b.type==="single")?1:b.n; });
    if(total>N_CAP){
      const ratio=(N_CAP - out.filter(b=>b.type==="single").length) / Math.max(1,(total - out.filter(b=>b.type==="single").length));
      out.forEach(b=>{ if(b.type!=="single") b.n=Math.max(0,Math.floor(b.n*ratio)); });
      warnings.push("粒子総数を上限"+N_CAP+"に縮小しました");
    }
    p.bodies=out;
  }
  if(p.rays!==undefined){
    if(!p.rays || !isNum(p.rays.n) || !isNum(p.rays.spread)) bad("rays.n/spread が不正です");
    else p.rays={n:clamp(Math.round(p.rays.n),0,64), spread:clamp(p.rays.spread,0,1)};
  }
  const ov={rotationCurve:false,tempHistogram:false,field:false,spectrum:false};
  if(p.overlays!==undefined){
    if(typeof p.overlays!=="object"||Array.isArray(p.overlays)) bad("overlaysはオブジェクト");
    else for(const k of Object.keys(ov)) if(typeof p.overlays[k]==="boolean") ov[k]=p.overlays[k];
  }
  p.overlays=ov;
  return errors.length? {ok:false, errors, warnings} : {ok:true, preset:p, warnings};
}

// ===== シミュレーションエンジン =====
function makeSim(){
  const S = {
    n:0, t:0, params:Object.assign({},DEFAULT_PHYSICS),
    world:{boundary:"none",size:0}, rays:null, overlays:{},
    m:null,x:null,y:null,vx:null,vy:null,spin:null,R:null,
    pinned:null, railR:null, railAng:null, railOmega:null, railCx:null, railCy:null,
    uPx:null,uPy:null,hasU:null, tau:null, ax:null,ay:null, sumW:null,uAx:null,uAy:null, ds:null,
    dpx:null,dpy:null, pairD:null,
    resPx:0,resPy:0,resL:0,radE:0,radL:0,   // リザーバ帳簿(E6′/E11。PHYSICS.md §5)
    curveBins:null, curveKep:null, tempLR:[0,0], histT:[],
  };
  S.alloc = function(n){
    S.n=n;
    const F=()=>new Float32Array(n);
    S.m=F();S.x=F();S.y=F();S.vx=F();S.vy=F();S.spin=F();S.R=F();
    S.uPx=F();S.uPy=F();S.tau=F();S.ax=F();S.ay=F();S.sumW=F();S.uAx=F();S.uAy=F();S.ds=F();
    S.dpx=F();S.dpy=F();
    S.pairD=new Float32Array(Math.max(1,n*(n-1)/2)); // 対距離キャッシュ(E6′反作用パスで再利用)
    S.railR=F();S.railAng=F();S.railOmega=F();S.railCx=F();S.railCy=F();
    S.pinned=new Uint8Array(n); S.hasU=new Uint8Array(n);
  };
  // プリセット→粒子生成(乱数はプリセットidで固定シード: ⏮で同じ初期配置を再現)
  S.build = function(preset){
    const rng = mulberry32(hashStr(preset.id||preset.name||"p")+7);
    const P = [];
    const phys = Object.assign({},DEFAULT_PHYSICS,preset.physics||{});
    const G = phys.G;
    const push=(o)=>P.push(o);
    // 大質量天体(m≥40)の内部に他の粒子を生成しない(深い初期重なりは不安定の原因)
    const bigs=[];
    const noteBig=(o)=>{ if(o.m>=40) bigs.push({x:o.x,y:o.y,R:phys.radiusScale*Math.sqrt(o.m)}); };
    const insideBig=(x,y)=>{ for(const b of bigs){ const dx=x-b.x,dy=y-b.y;
      if(dx*dx+dy*dy<(b.R+1)*(b.R+1)) return true; } return false; };
    for(const b of preset.bodies){
      if(b.type==="single"){
        const o={m:b.m,x:b.x,y:b.y,vx:b.vx,vy:b.vy,spin:b.spin,pinned:b.pinned?1:0,railOmega:0};
        push(o); noteBig(o);
      } else if(b.type==="ring"){
        for(let i=0;i<b.n;i++){
          let ang,r,x,y,tries=0;
          do{
            ang = (i/b.n)*Math.PI*2 + rng()*0.02 + (tries?((rng()-0.5)*0.3):0);
            r = b.rIn + (b.rOut-b.rIn)*rng();
            x=b.cx+r*Math.cos(ang); y=b.cy+r*Math.sin(ang);
          }while(insideBig(x,y) && ++tries<30);
          let vt=0;
          if(b.vMode==="kepler" && b.aroundMass>0 && r>1) vt=Math.sqrt(G*b.aroundMass/r)*b.direction;
          else if(b.vMode==="omega") vt=b.omega*r*b.direction;
          const jit=1+(rng()*2-1)*b.vNoise, vr=(rng()*2-1)*b.vNoise*Math.abs(vt)*0.5;
          const tx=-Math.sin(ang), ty=Math.cos(ang);
          const o={m:b.mMin+(b.mMax-b.mMin)*rng(), x,y,
            vx:vt*jit*tx + vr*Math.cos(ang), vy:vt*jit*ty + vr*Math.sin(ang),
            spin:b.spinMin+(b.spinMax-b.spinMin)*rng(), pinned:b.pinned?1:0, railOmega:0};
          if(b.pinned && b.vMode==="omega"){ o.railOmega=b.omega*b.direction; o.railR=r; o.railAng=ang; o.railCx=b.cx; o.railCy=b.cy; }
          push(o);
        }
      } else if(b.type==="disk"){
        for(let i=0;i<b.n;i++){
          let ang,r,x,y,tries=0;
          do{
            ang=rng()*Math.PI*2; r=b.radius*Math.sqrt(rng());
            x=b.cx+r*Math.cos(ang); y=b.cy+r*Math.sin(ang);
          }while(insideBig(x,y) && ++tries<30);
          const tx=-Math.sin(ang), ty=Math.cos(ang);
          let vX=0,vY=0;
          if(b.vMode==="kepler" && b.aroundMass>0 && r>1){ const v=Math.sqrt(G*b.aroundMass/r)*b.vScale*b.direction; vX=v*tx; vY=v*ty; }
          else if(b.vMode==="rigid"){ const v=b.vScale*r*b.direction; vX=v*tx; vY=v*ty; }
          else if(b.vMode==="flat"){ const v=b.vScale*b.direction; vX=v*tx; vY=v*ty; }
          else if(b.vMode==="random"){ const a2=rng()*Math.PI*2, v=b.vScale*rng(); vX=v*Math.cos(a2); vY=v*Math.sin(a2); }
          vX += (rng()*2-1)*0.02; vY += (rng()*2-1)*0.02;
          push({m:b.mMin+(b.mMax-b.mMin)*rng(), x,y, vx:vX, vy:vY,
            spin:b.spinMin+(b.spinMax-b.spinMin)*rng(), pinned:0, railOmega:0});
        }
      } else if(b.type==="box"){
        for(let i=0;i<b.n;i++){
          let x,y,tries=0;
          do{ x=b.cx+(rng()-0.5)*b.w; y=b.cy+(rng()-0.5)*b.h; }while(insideBig(x,y) && ++tries<30);
          const a2=rng()*Math.PI*2, v=b.vScale*rng();
          push({m:b.mMin+(b.mMax-b.mMin)*rng(), x,y, vx:v*Math.cos(a2), vy:v*Math.sin(a2),
            spin:b.spinMin+(b.spinMax-b.spinMin)*rng(), pinned:0, railOmega:0});
        }
      }
    }
    S.alloc(P.length);
    P.forEach((o,i)=>{ S.m[i]=o.m; S.x[i]=o.x; S.y[i]=o.y; S.vx[i]=o.vx; S.vy[i]=o.vy;
      S.spin[i]=o.spin; S.pinned[i]=o.pinned; S.railOmega[i]=o.railOmega||0;
      if(o.railOmega){ S.railR[i]=o.railR; S.railAng[i]=o.railAng; S.railCx[i]=o.railCx; S.railCy[i]=o.railCy; }
    });
    S.params = phys;
    S.world = preset.world; S.rays = preset.rays||null; S.overlays = preset.overlays||{};
    S.t=0; S.hasU.fill(0); S.tau.fill(0); S.updateRadii();
    S.resPx=0; S.resPy=0; S.resL=0; S.radE=0; S.radL=0;
    S.curveBins=null; S.tempLR=[0,0]; S.histT=[];
  };
  S.updateRadii = function(){ // R_i = radiusScale·√m (PHYSICS.md §2)
    const rs=S.params.radiusScale;
    for(let i=0;i<S.n;i++) S.R[i]=rs*Math.sqrt(S.m[i]);
  };
  // 1サブステップ(PHYSICS.md v1.1 §5 数値スキーム: ①全対 → ②粒子 → ③反作用対 → ④位置)
  S.step = function(dt){
    const n=S.n, p=S.params;
    if(!n){ S.t+=dt; return; }
    const {m,x,y,vx,vy,spin,R,pinned,ax,ay,sumW,uAx,uAy,ds,dpx,dpy,pairD}=S;
    const eps=p.softening, eps2=eps*eps, G=p.G, q=p.q, kRep=p.kRep,
          muF=p.muF, gammaN=p.gammaN, kappaS=p.kappaS, D0=p.D0, kFrame=p.kFrame,
          etaRad=p.etaRad, pRad=p.pRad;
    if(Math.abs(R[0]-p.radiusScale*Math.sqrt(m[0]))>1e-6) S.updateRadii(); // radiusScale変更の追従
    ax.fill(0); ay.fill(0); sumW.fill(0); uAx.fill(0); uAy.fill(0); ds.fill(0);
    dpx.fill(0); dpy.fill(0);
    // レール粒子(pinned+omega)の位置・速度を先に更新
    for(let i=0;i<n;i++){
      if(pinned[i] && S.railOmega[i]!==0){
        S.railAng[i]+=S.railOmega[i]*dt;
        const a=S.railAng[i], r=S.railR[i];
        x[i]=S.railCx[i]+r*Math.cos(a); y[i]=S.railCy[i]+r*Math.sin(a);
        vx[i]=-S.railOmega[i]*r*Math.sin(a); vy[i]=S.railOmega[i]*r*Math.cos(a);
      }
    }
    // ===== ① 全対ループ: E1決定力・E3フレーム・E4重力・E5′斥力・E9接触・E10′拡散 =====
    let pk=0; // 対インデックス(pairD 書き込み位置)
    for(let i=0;i<n;i++){
      const mi=m[i], Ri=R[i], si=spin[i];
      const xi=x[i], yi=y[i];
      for(let j=i+1;j<n;j++,pk++){
        const dx=xi-x[j], dy=yi-y[j];
        const d2=dx*dx+dy*dy, d=Math.sqrt(d2);
        pairD[pk]=d;                          // E6′反作用パスで再利用
        const mj=m[j], Rj=R[j], sj=spin[j];
        // E4 重力(ソフトニング付き逆二乗)
        const invd3=1/((d2+eps2)*Math.sqrt(d2+eps2));
        const fg=G*invd3;
        ax[i]-=fg*mj*dx; ay[i]-=fg*mj*dy;
        ax[j]+=fg*mi*dx; ay[j]+=fg*mi*dy;
        // E1′ 決定力 w = m/√(d²+ε²)(v1.5: Plummer型。E4 = G∇W が厳密成立、L5解消)
        const invW=1/Math.sqrt(d2+eps2);
        const wj=mj*invW, wi=mi*invW;
        sumW[i]+=wj; sumW[j]+=wi;
        // E2/E3 フレーム速度への寄与(並進 + スピン回転 ẑ×(r−r_j)=(−dy,dx))
        let omj=0, omi=0;
        if(sj!==0){ const tt=Rj/(Rj+d); omj = (q===2)? sj*tt*tt : sj*Math.pow(tt,q); }
        if(si!==0){ const tt=Ri/(Ri+d); omi = (q===2)? si*tt*tt : si*Math.pow(tt,q); }
        uAx[i]+=wj*(vx[j]+omj*(-dy)); uAy[i]+=wj*(vy[j]+omj*(dx));
        uAx[j]+=wi*(vx[i]+omi*(dy));  uAy[j]+=wi*(vy[i]+omi*(-dx));
        // E5′ スピン斥力(対称化・中心力): F = kRep·μ·(ω_i²+ω_j²)·(r_i−r_j)
        if(kRep>0 && (omi!==0||omj!==0)){
          const f=kRep*(mi*mj/(mi+mj))*(omi*omi+omj*omj);
          ax[i]+=f/mi*dx; ay[i]+=f/mi*dy;
          ax[j]-=f/mj*dx; ay[j]-=f/mj*dy;
        }
        // E9 接触(重なり)
        const sumR=Ri+Rj;
        if(d<sumR && d>1e-9){
          const nxv=dx/d, nyv=dy/d;           // n̂ (j→i)
          const invMi=pinned[i]?0:1/mi, invMj=pinned[j]?0:1/mj;
          const K=invMi+invMj;
          // 法線ばね(換算質量スケール+「軽い側の加速度≤8」の対称な力上限。
          // 上限を両側独立に掛けると作用反作用が破れ、めり込んだ粒子が
          // 重い天体を押し続ける「ロケット」になるため、必ず力で対称にキャップする)
          const muM=mi*mj/(mi+mj);
          let Fs=40*(sumR-d)*muM;
          const maxInv=Math.max(invMi,invMj);
          if(maxInv>0 && Fs*maxInv>8) Fs=8/maxInv;
          ax[i]+=Fs*nxv*invMi; ay[i]+=Fs*nyv*invMi;
          ax[j]-=Fs*nxv*invMj; ay[j]-=Fs*nyv*invMj;
          if(K>0){
            const rvx=vx[i]-vx[j], rvy=vy[i]-vy[j];
            const vn=rvx*nxv+rvy*nyv;
            if(vn<0){ // 接近時のみ法線減衰(非弾性)。散逸分は衝突閃光として放射(A12)
              const jn=-gammaN*vn/K;
              vx[i]+=jn*nxv*invMi; vy[i]+=jn*nyv*invMi;
              vx[j]-=jn*nxv*invMj; vy[j]-=jn*nyv*invMj;
              S.radE+=0.5*(1/K)*vn*vn*(1-(1-gammaN)*(1-gammaN));
            }
            // 接線摩擦: 速度→スピン変換(A9 の本体。v1.1: 作用線を一致させ L 厳密保存)
            const txv=-nyv, tyv=nxv;          // t̂ = ẑ×n̂
            const Li=Ri*d/sumR, Lj=Rj*d/sumR; // 実効腕 R̃(R̃_i+R̃_j=d)
            const vs=(vx[i]-vx[j])*txv+(vy[i]-vy[j])*tyv - spin[i]*Li - spin[j]*Lj;
            const jt=muF*vs/(3*K);            // Δv_s = −muF·v_s(muF≤1 で無条件安定)
            // v1.5(A12′): すべり散逸の帳簿。変更されるDOF(接線速度成分+スピン)のみの運動エネルギー差を厳密計上
            const vti0=vx[i]*txv+vy[i]*tyv, vtj0=vx[j]*txv+vy[j]*tyv;
            const Ii9=0.5*mi*Ri*Ri, Ij9=0.5*mj*Rj*Rj;
            const si0=spin[i], sj0=spin[j];
            vx[i]-=jt*invMi*txv; vy[i]-=jt*invMi*tyv;
            vx[j]+=jt*invMj*txv; vy[j]+=jt*invMj*tyv;
            if(!pinned[i]) spin[i]+=Li*jt/Ii9;             // ds = +R̃·j_t/I, I=½mR²
            if(!pinned[j]) spin[j]+=Lj*jt/Ij9;
            const vti1=vx[i]*txv+vy[i]*tyv, vtj1=vx[j]*txv+vy[j]*tyv;
            const dE9=0.5*mi*(vti0*vti0-vti1*vti1)+0.5*mj*(vtj0*vtj0-vtj1*vtj1)
                     +0.5*Ii9*(si0*si0-spin[i]*spin[i])+0.5*Ij9*(sj0*sj0-spin[j]*spin[j]);
            if(dE9>0) S.radE+=dE9;            // 解析的に dE9≥0(μ_f≤1)。丸め起因の負値は捨てる
          }
        }
        // E10′ スピン拡散(I 重み: 対ごとに I_i·ds_i = −I_j·ds_j で L 厳密保存)
        if(kappaS>0){
          const g=(sumR/(sumR+d)); const gg=g*g;
          if(gg>1e-4){
            const Ii=0.5*mi*Ri*Ri, Ij=0.5*mj*Rj*Rj;
            const c=kappaS*(sj-si)*gg/(Ii+Ij);
            ds[i]+=c*Ij;
            ds[j]-=c*Ii;
          }
        }
      }
    }
    // ===== ② 粒子ループ: 速度更新・E6′輸送(Δp確定)・スピン拡散・E11放射冷却 =====
    let anyDp=false;
    for(let i=0;i<n;i++){
      if(pinned[i]) continue;
      vx[i]+=ax[i]*dt; vy[i]+=ay[i]*dt;
      // E6′ 輸送項(自分自身は除外して評価。1サブステップの引きずり量は0.8に制限)
      const denom=D0+sumW[i];
      if(denom>1e-9 && kFrame>0){
        const ux=uAx[i]/denom, uy=uAy[i]/denom;
        if(S.hasU[i]){
          let dux=ux-S.uPx[i], duy=uy-S.uPy[i];
          const dl2=dux*dux+duy*duy;
          if(dl2>0.64){ const sc=0.8/Math.sqrt(dl2); dux*=sc; duy*=sc; }
          vx[i]+=kFrame*dux; vy[i]+=kFrame*duy;
          dpx[i]=m[i]*kFrame*dux; dpy[i]=m[i]*kFrame*duy;  // Δp_i(反作用パスで分配)
          if(dpx[i]!==0||dpy[i]!==0) anyDp=true;
        }
        S.uPx[i]=ux; S.uPy[i]=uy; S.hasU[i]=1;
      }
      // v1.5(A12′): スピン同期(E10′)の散逸帳簿。適用前後の回転エネルギー差を計上
      if(ds[i]!==0){
        const IiD=0.5*m[i]*R[i]*R[i], s0D=spin[i];
        spin[i]+=ds[i]*dt;
        S.radE+=0.5*IiD*(s0D*s0D-spin[i]*spin[i]);
      }
      // E11 放射冷却(A12): Λ = η_rad·T^p、T = I·s²。|Δs| ≤ 0.5|s| にクランプ
      if(etaRad>0 && spin[i]!==0){
        const Ii=0.5*m[i]*R[i]*R[i], s0=spin[i], T=Ii*s0*s0;
        let dsC=etaRad*Math.pow(T,pRad)*dt/(Ii*Math.abs(s0));
        const lim=0.5*Math.abs(s0); if(dsC>lim) dsC=lim;
        const s1=(s0>0)? s0-dsC : s0+dsC;
        S.radE+=0.5*Ii*(s0*s0-s1*s1); S.radL+=Ii*(s0-s1);
        spin[i]=s1;
      }
    }
    // ===== ③ E6′ 反作用対ループ: φ_ij 分配・残余トルクのスピン移譲・リザーバ帳簿 =====
    if(kFrame>0 && anyDp){
      let pk2=0;
      for(let i=0;i<n;i++){
        const mi=m[i], xi=x[i], yi=y[i];
        const Ii=0.5*mi*R[i]*R[i];
        const Wi=D0+sumW[i];
        const dpxi=dpx[i], dpyi=dpy[i];
        const hasI=(dpxi!==0||dpyi!==0)&&Wi>1e-9;
        for(let j=i+1;j<n;j++,pk2++){
          const dpxj=dpx[j], dpyj=dpy[j];
          const Wj=D0+sumW[j];
          const hasJ=(dpxj!==0||dpyj!==0)&&Wj>1e-9;
          if(!hasI&&!hasJ) continue;
          const d=pairD[pk2], dx=xi-x[j], dy=yi-y[j];
          const Ij=0.5*m[j]*R[j]*R[j];
          if(hasI){ // i が受けた Δp_i の反作用をソース j へ(φ_ij = w_j(r_i)/W(r_i))
            const phi=(m[j]/Math.sqrt(d*d+eps2))/Wi;
            const rpx=phi*dpxi, rpy=phi*dpyi;
            if(pinned[j]){ S.resPx-=rpx; S.resPy-=rpy; S.resL-=xi*rpy-yi*rpx; }
            else{
              vx[j]-=rpx/m[j]; vy[j]-=rpy/m[j];
              const dsn=(dx*rpy-dy*rpx)/(Ii+Ij);  // 残余トルク n_ij を等角加速度で移譲
              spin[i]-=dsn; spin[j]-=dsn;
            }
          }
          if(hasJ){ // j が受けた Δp_j の反作用をソース i へ(φ_ji = w_i(r_j)/W(r_j))
            const phi=(mi/Math.sqrt(d*d+eps2))/Wj;
            const rpx=phi*dpxj, rpy=phi*dpyj;
            if(pinned[i]){ S.resPx-=rpx; S.resPy-=rpy; S.resL-=x[j]*rpy-y[j]*rpx; }
            else{
              vx[i]-=rpx/mi; vy[i]-=rpy/mi;
              const dsn=((x[j]-xi)*rpy-(y[j]-yi)*rpx)/(Ii+Ij);
              spin[j]-=dsn; spin[i]-=dsn;
            }
          }
        }
      }
      // 背景 D₀ 分は無限慣性リザーバへ移譲(帳簿記録)
      if(D0>0){
        for(let i=0;i<n;i++){
          if(dpx[i]===0&&dpy[i]===0) continue;
          const Wi=D0+sumW[i]; if(Wi<=1e-9) continue;
          const phiBg=D0/Wi;
          const rpx=phiBg*dpx[i], rpy=phiBg*dpy[i];
          S.resPx-=rpx; S.resPy-=rpy; S.resL-=x[i]*rpy-y[i]*rpx;
        }
      }
    }
    // ===== ④ 粒子ループ: 安全上限・位置更新・境界・時計 =====
    const b=S.world;
    for(let i=0;i<n;i++){
      if(pinned[i]){ S.tauUpdate(i,dt); continue; }
      // 安全上限(発散防止): 速度100・スピン±40
      const vv2=vx[i]*vx[i]+vy[i]*vy[i];
      if(vv2>10000){ const sc=100/Math.sqrt(vv2); vx[i]*=sc; vy[i]*=sc; }
      if(spin[i]>40) spin[i]=40; else if(spin[i]<-40) spin[i]=-40;
      x[i]+=vx[i]*dt; y[i]+=vy[i]*dt;
      // 境界
      if(b.boundary==="box"){
        const s=b.size;
        if(x[i]>s){x[i]=s; vx[i]=-Math.abs(vx[i])*0.95;} else if(x[i]<-s){x[i]=-s; vx[i]=Math.abs(vx[i])*0.95;}
        if(y[i]>s){y[i]=s; vy[i]=-Math.abs(vy[i])*0.95;} else if(y[i]<-s){y[i]=-s; vy[i]=Math.abs(vy[i])*0.95;}
      } else if(b.boundary==="circle"){
        const s=b.size, r2=x[i]*x[i]+y[i]*y[i];
        if(r2>s*s){ const r=Math.sqrt(r2), nx2=x[i]/r, ny2=y[i]/r;
          const vr=vx[i]*nx2+vy[i]*ny2;
          if(vr>0){ vx[i]-=2*vr*nx2*0.975; vy[i]-=2*vr*ny2*0.975; }
          x[i]=nx2*s; y[i]=ny2*s; }
      }
      S.tauUpdate(i,dt);
    }
    S.t+=dt;
  };
  // 保存量(T7): P = Σmv、L = Σm(r×v) + ΣIs(保存量モニタ・V1 検証で使用)
  S.totals = function(){
    let px=0,py=0,L=0;
    for(let i=0;i<S.n;i++){
      px+=S.m[i]*S.vx[i]; py+=S.m[i]*S.vy[i];
      L+=S.m[i]*(S.x[i]*S.vy[i]-S.y[i]*S.vx[i]) + 0.5*S.m[i]*S.R[i]*S.R[i]*S.spin[i];
    }
    return {px,py,L};
  };
  // E7R 固有時間(v1.7・ψ統一): dτ/dt = √(N²−A²|v−u|²/c₀²)、N=e^{−ψ}、A=e^{+ψ}、
  // ψ = W_ext/Kt(外部の決定力のみ=自己場除外)。u は E3 と同じ自己除外フレーム。
  // 弱場・低速で 1−ψ−|v−u|²/(2c₀²) となり旧 E7(1/(1+ψ))の一次形と一致し、
  // 共動フレームに対する運動の時間遅れが加わる(A7′。DERIVATIONS §10.4/§11)
  S.tauUpdate=function(i,dt){
    const denom=S.params.D0+S.sumW[i];
    const psi=denom/S.params.Kt;
    const N=Math.exp(-psi), A=Math.exp(psi);
    let rvx=0, rvy=0;
    if(denom>1e-9){ // フレーム不在(W_ext=0)なら運動は定義されず、運動時間遅れなし(T1 整合)
      rvx=S.vx[i]-S.uAx[i]/denom; rvy=S.vy[i]-S.uAy[i]/denom;
    }
    const c0=S.params.cLight;
    const rad=N*N - A*A*(rvx*rvx+rvy*rvy)/(c0*c0);
    S.tau[i]+= rad>0 ? dt*Math.sqrt(rad) : 0; // 根号内≤0 = 局所光速超過(非物理域)→ 時計停止
  };
  // 任意点の決定力 W(可視化・光線用: 全粒子を含む)
  S.Wat=function(px,py){
    let w=S.params.D0; const eps=S.params.softening;
    for(let i=0;i<S.n;i++){ const dx=px-S.x[i], dy=py-S.y[i];
      w+=S.m[i]/Math.sqrt(dx*dx+dy*dy+eps*eps); }
    return w;
  };
  S.hasNaN=function(){
    for(let i=0;i<S.n;i++) if(!isFinite(S.x[i])||!isFinite(S.y[i])||!isFinite(S.vx[i])) return true;
    return false;
  };
  return S;
}

// 温度→色(青→白→橙→赤)
function tempColor(t){ // t: 0..1

  if(t<0.67){ const k=(t-0.34)/0.33; return `rgb(255,${255-k*98},${255-k*186})`; }

// E8R 光線積分(v1.7・ψ統一。描画と V8 検証で共有。質量 m≥RAY_MASS_MIN のみが曲げる近似)
// 屈折率 n_eff = e^{2ψ} = e^{2W/Kt}(kLens 廃止 — 時計 E7R と同じ ψ が光を曲げる)。
// 方向更新はフェルマー則 dĉ/dl = (∇n−(∇n·ĉ)ĉ)/n で、∇n/n = 2∇ψ = (2/Kt)∇W と
// 指数部が消えるため 2∇ψ を直接使う。位置更新に媒質随伴 u·(n_eff/c₀)·dl を加える(A11)。
// emit(x,y) が false を返すと打ち切り。終端の位置と方向を返す。
function traceRay(S, px, py, cxv, cyv, dl, maxSteps, emit){
  const p=S.params, kU=2/p.Kt, eps=p.softening, eps2=eps*eps, q=p.q, c0=p.cLight, D0=p.D0;
  const heavy=[];
  for(let i=0;i<S.n;i++) if(S.m[i]>=RAY_MASS_MIN) heavy.push(i);
  for(let s2=0;s2<maxSteps;s2++){
    // 2∇ψ = −(2/Kt) Σ m (r−r_j)/(d²+ε²)^{3/2}、u は E3 と同形(重い天体のみ)
    let gx=0, gy=0, uNx=0, uNy=0, wSum=0;
    for(const i of heavy){
      const dx=px-S.x[i], dy=py-S.y[i], d2=dx*dx+dy*dy;
      const inv=1/Math.sqrt(d2+eps2);
      const inv3=inv*inv*inv;
      gx-=kU*S.m[i]*dx*inv3; gy-=kU*S.m[i]*dy*inv3;
      const dd=Math.sqrt(d2), w=S.m[i]*inv;   // v1.5: E1′(inv=1/√(d²+ε²) を再利用。dd は下の tt で使用)
      wSum+=w;
      let om=0; const si=S.spin[i];
      if(si!==0){ const tt=S.R[i]/(S.R[i]+dd); om=(q===2)? si*tt*tt : si*Math.pow(tt,q); }
      uNx+=w*(S.vx[i]+om*(-dy)); uNy+=w*(S.vy[i]+om*(dx));
    }
    const dot=gx*cxv+gy*cyv;
    cxv+=(gx-dot*cxv)*dl; cyv+=(gy-dot*cyv)*dl;
    const cl=Math.sqrt(cxv*cxv+cyv*cyv); cxv/=cl; cyv/=cl;
    const Wtot=D0+wSum;
    const neff=Math.exp(kU*Wtot);            // n_eff = e^{2ψ}(ψ は背景 D₀ を含む全 W)
    const adv=(Wtot>1e-9)? (neff/c0)*dl/Wtot : 0;
    px+=cxv*dl+uNx*adv; py+=cyv*dl+uNy*adv;
    if(emit && emit(px,py)===false) break;
  }
  return {x:px, y:py, cx:cxv, cy:cyv};
}
function drawRays(){
  const rays=sim.rays; if(!rays||rays.n<1) return;
  const z=zoom(), x0=camX-(cw/2)/z-10;
  const dl=camScale/110, maxSteps=340;
  ctx.lineWidth=1; ctx.strokeStyle="rgba(255,240,170,0.55)";
  for(let r=0;r<rays.n;r++){
    const px=x0, py=camY+((r+0.5)/rays.n-0.5)*2*rays.spread*camScale;
    ctx.beginPath(); ctx.moveTo(w2sX(px),w2sY(py));
    traceRay(sim, px, py, 1, 0, dl, maxSteps, (nx,ny)=>{
      ctx.lineTo(w2sX(nx),w2sY(ny));
      return !(Math.abs(nx-camX)>camScale*2.2||Math.abs(ny-camY)>camScale*2.2);
    });
    ctx.stroke();
  }
}

// 回転曲線オーバーレイ(実測 vs ケプラー予想)
let curveTick=0, curveData=null;
function drawRotationCurve(){
  if((curveTick++%10)===0||!curveData){
    const BINS=12, sums=new Float32Array(BINS), cnts=new Float32Array(BINS);
    let mMax=0, cxm=0, cym=0;
    for(let i=0;i<sim.n;i++) if(sim.m[i]>mMax){ mMax=sim.m[i]; cxm=sim.x[i]; cym=sim.y[i]; }
    for(let i=0;i<sim.n;i++){
      const dx=sim.x[i]-cxm, dy=sim.y[i]-cym, r=Math.sqrt(dx*dx+dy*dy);
      if(r<1||sim.m[i]===mMax) continue;
      const bi=Math.min(BINS-1,Math.floor(r/camScale*BINS));
      const vt=Math.abs((-dy*sim.vx[i]+dx*sim.vy[i])/r);
      sums[bi]+=vt; cnts[bi]++;
    }
    const meas=[], kep=[];
    for(let b2=0;b2<BINS;b2++){
      meas.push(cnts[b2]>2?sums[b2]/cnts[b2]:null);
      const r=(b2+0.5)/BINS*camScale;
      kep.push(Math.sqrt(sim.params.G*mMax/Math.max(r,1)));
    }
    curveData={meas,kep};
  }
  const W=150,H=92,X=cw-W-8,Y=ch-H-8;
  ctx.fillStyle="rgba(12,16,34,0.82)"; ctx.fillRect(X,Y,W,H);
  ctx.strokeStyle="#2a3060"; ctx.strokeRect(X,Y,W,H);
  ctx.font="9px sans-serif"; ctx.fillStyle="#8b93c8";
  ctx.fillText("v(r): 実測(青) / ケプラー(点線)",X+6,Y+11);
  let vmax=0.01;
  curveData.meas.forEach(v=>{if(v&&v>vmax)vmax=v;});
  curveData.kep.forEach(v=>{if(v>vmax)vmax=v;});
  const px=(b2)=>X+8+(b2/(curveData.meas.length-1))*(W-16), py=(v)=>Y+H-8-(v/vmax)*(H-26);
  ctx.strokeStyle="#8b93c8"; ctx.setLineDash([3,3]); ctx.beginPath();
  curveData.kep.forEach((v,b2)=>{ b2?ctx.lineTo(px(b2),py(v)):ctx.moveTo(px(b2),py(v)); }); ctx.stroke();
  ctx.setLineDash([]); ctx.strokeStyle="#5b8cff"; ctx.lineWidth=1.6; ctx.beginPath();
  let started=false;
  curveData.meas.forEach((v,b2)=>{ if(v==null)return; started?ctx.lineTo(px(b2),py(v)):ctx.moveTo(px(b2),py(v)); started=true; });
  ctx.stroke(); ctx.lineWidth=1;
}

// 温度ヒストグラム(左右の平均温度)
let tempTick=0;
function drawTempHistogram(){

    }
    sim.tempLR=[cl?sl/cl:0, cr?sr/cr:0];

  ctx.strokeStyle="#2a3060"; ctx.strokeRect(X,Y,W,H);
  ctx.font="9px sans-serif"; ctx.fillStyle="#8b93c8";
  ctx.fillText("平均温度(Is²) 左/右",X+6,Y+11);
  const mx=Math.max(0.01,sim.tempLR[0],sim.tempLR[1]);
  ctx.fillStyle="#6aa5ff"; ctx.fillRect(X+18,Y+H-12-(sim.tempLR[0]/mx)*(H-34),26,(sim.tempLR[0]/mx)*(H-34));
  ctx.fillStyle="#ff9d45"; ctx.fillRect(X+58,Y+H-12-(sim.tempLR[1]/mx)*(H-34),26,(sim.tempLR[1]/mx)*(H-34));
  ctx.fillStyle="#8b93c8"; ctx.fillText("左",X+26,Y+H-3); ctx.fillText("右",X+66,Y+H-3);
  // 時系列
  let hm=0.01; sim.histT.forEach(a=>{hm=Math.max(hm,a[0],a[1]);});
  const hx=(k)=>X+96+(k/59)*(W-104);
  ["#6aa5ff","#ff9d45"].forEach((col,ch2)=>{

    sim.histT.forEach((a,k)=>{ const yy=Y+H-12-(a[ch2]/hm)*(H-34); k?ctx.lineTo(hx(k),yy):ctx.moveTo(hx(k),yy); });
    ctx.stroke();
  });
}

// 放射スペクトル(各粒子のピーク波長 λ=b_m/T の分布。付録C C1)
let specTick=0, specData=null, specLo=0, specHi=0, specInit=false, specLastT=Infinity;
function drawSpectrum(){
  const BINS=28;
  if(sim.t<specLastT){ specInit=false; specData=null; }  // ⏮/プリセット切替で軸範囲をリセット
  specLastT=sim.t;
  if((specTick++%10)===0||!specData){
    const ls=[], Ts=[], p=sim.params.pRad;
    let lMin=Infinity, lMax=-Infinity;
    for(let i=0;i<sim.n;i++){
      const T=0.5*sim.m[i]*sim.R[i]*sim.R[i]*sim.spin[i]*sim.spin[i];
      if(T<=1e-9) continue;
      const l=Math.log10(sim.params.bM/T);
      ls.push(l); Ts.push(T);
      if(l<lMin)lMin=l; if(l>lMax)lMax=l;
    }
    if(!ls.length){ specData={empty:true}; }
    else{
      if(lMax-lMin<1e-6){ lMin-=0.5; lMax+=0.5; }
      const pad=(lMax-lMin)*0.05; lMin-=pad; lMax+=pad;
      if(!specInit){ specLo=lMin; specHi=lMax; specInit=true; }
      else{ specLo+=(lMin-specLo)*0.1; specHi+=(lMax-specHi)*0.1; }
      const lum=new Float32Array(BINS), tSum=new Float32Array(BINS), tCnt=new Float32Array(BINS);
      for(let k=0;k<ls.length;k++){
        let b2=Math.floor((ls[k]-specLo)/(specHi-specLo)*BINS);
        b2=Math.max(0,Math.min(BINS-1,b2));
        lum[b2]+=Math.pow(Ts[k],p); tSum[b2]+=Ts[k]; tCnt[b2]++;
      }
      let lumMax=0; for(let b2=0;b2<BINS;b2++) if(lum[b2]>lumMax)lumMax=lum[b2];
      specData={empty:false, lum, tSum, tCnt, lumMax};
    }
  }
  const W=150,H=92,X=cw-W-8,Y=ch-H-8;
  ctx.fillStyle="rgba(12,16,34,0.82)"; ctx.fillRect(X,Y,W,H);
  ctx.strokeStyle="#2a3060"; ctx.strokeRect(X,Y,W,H);
  ctx.font="9px sans-serif"; ctx.fillStyle="#8b93c8";
  ctx.fillText("放射ピーク λ=b_m/T",X+6,Y+11);
  if(specData.empty){ ctx.fillText("放射なし(T≈0)",X+6,Y+H/2); return; }
  const bw=(W-16)/BINS;
  for(let b2=0;b2<BINS;b2++){
    if(specData.lum[b2]<=0) continue;
    // 高さ∝光度^0.15(Λ∝T⁴の比が巨大でも低温の輝線が見えるよう強く圧縮)+最低2px
    const h=Math.max(2,Math.pow(specData.lum[b2]/specData.lumMax,0.15)*(H-30));
    const Tm=specData.tCnt[b2]? specData.tSum[b2]/specData.tCnt[b2] : 0;
    ctx.fillStyle=tempColor(Math.min(1,Math.sqrt(Tm/Math.max(1e-4,tempP90EMA))));
    ctx.fillRect(X+8+b2*bw, Y+H-14-h, Math.max(1.5,bw-1), h);
  }
  ctx.fillStyle="#8b93c8";
  ctx.fillText("短λ=高温",X+6,Y+H-3);
  const txt="長λ=低温"; ctx.fillText(txt,X+W-6-ctx.measureText(txt).width,Y+H-3);
  ctx.fillText(fmt(Math.pow(10,specLo)),X+8,Y+22);
  const t2=fmt(Math.pow(10,specHi)); ctx.fillText(t2,X+W-8-ctx.measureText(t2).width,Y+22);
}

// 背景の微星(装飾)
let bgStars=null;
function drawBG(){
  if(!bgStars){ const r=mulberry32(42); bgStars=[];
    for(let i=0;i<70;i++) bgStars.push([r(),r(),r()*1.2+0.3]); }
  ctx.fillStyle="rgba(200,210,255,0.35)";
  for(const s of bgStars){ ctx.fillRect(s[0]*cw,s[1]*ch,s[2],s[2]); }
}

let trailsOn=false;
function render(){
  ctx.setTransform(dpr,0,0,dpr,0,0);
  if(trailsOn){ ctx.fillStyle="rgba(5,7,15,0.18)"; ctx.fillRect(0,0,cw,ch); }
  else { ctx.fillStyle="#05070f"; ctx.fillRect(0,0,cw,ch); drawBG(); }
  if(sim.overlays.field) drawField();
  // 境界
  const z=zoom();
  if(sim.world.boundary!=="none"){
    ctx.strokeStyle="rgba(139,147,200,0.5)"; ctx.setLineDash([5,5]);
    if(sim.world.boundary==="box"){
      const s=sim.world.size;
      ctx.strokeRect(w2sX(-s),w2sY(-s),2*s*z,2*s*z);
    } else { ctx.beginPath(); ctx.arc(w2sX(0),w2sY(0),sim.world.size*z,0,7); ctx.stroke(); }
    ctx.setLineDash([]);
  }
  drawRays();
  // 熱=T=Is² の正規化(A9 v1.1。90パーセンタイル+EMA: 単一の大質量天体で飽和させない)
  if(sim.n>0){
    if(!tSort||tSort.length!==sim.n) tSort=new Float32Array(sim.n);
    for(let i=0;i<sim.n;i++) tSort[i]=0.5*sim.m[i]*sim.R[i]*sim.R[i]*sim.spin[i]*sim.spin[i];
    tSort.sort();
    const p90=Math.max(1e-4, tSort[Math.floor(0.9*(sim.n-1))]);
    tempP90EMA+= (p90-tempP90EMA)*0.05;
  }
  // 粒子(表示半径は30pxで頭打ち。物理半径Rはそのまま)
  for(let i=0;i<sim.n;i++){
    const sx=w2sX(sim.x[i]), sy=w2sY(sim.y[i]);
    if(sx<-40||sx>cw+40||sy<-40||sy>ch+40) continue;
    const T=0.5*sim.m[i]*sim.R[i]*sim.R[i]*sim.spin[i]*sim.spin[i];
    const rr=Math.max(1.2,Math.min(sim.R[i]*z,30));
    const col=tempColor(Math.min(1,Math.sqrt(T/Math.max(1e-4,tempP90EMA))));
    if(rr>=7){ // 大きな天体はグロー付きで描く
      const g=ctx.createRadialGradient(sx,sy,rr*0.4,sx,sy,rr*2.4);
      g.addColorStop(0,col); g.addColorStop(1,"rgba(0,0,0,0)");
      ctx.globalAlpha=0.45; ctx.fillStyle=g;
      ctx.beginPath(); ctx.arc(sx,sy,rr*2.4,0,7); ctx.fill(); ctx.globalAlpha=1;
    }
    ctx.fillStyle=col;
    ctx.beginPath(); ctx.arc(sx,sy,rr,0,7); ctx.fill();
    if(sim.pinned[i]){ ctx.strokeStyle="rgba(255,255,255,0.75)"; ctx.beginPath(); ctx.arc(sx,sy,rr+2,0,7); ctx.stroke(); }
  }
  // 選択粒子の固有時計
  if(selIdx>=0&&selIdx<sim.n){
    const i=selIdx, sx=w2sX(sim.x[i]), sy=w2sY(sim.y[i]);
    ctx.strokeStyle="#59d499"; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(sx,sy,Math.max(6,sim.R[i]*z+5),0,7); ctx.stroke();
    const frac=sim.t>0? sim.tau[i]/sim.t : 1;
    ctx.beginPath(); ctx.arc(sx,sy,Math.max(10,sim.R[i]*z+9),-Math.PI/2,-Math.PI/2+frac*Math.PI*2);
    ctx.strokeStyle="#ffd166"; ctx.stroke(); ctx.lineWidth=1;
    // 温度 T=Is² と放射ピーク波長 λ=b_m/T(A12 分光温度計)を併記
    const Ti=0.5*sim.m[i]*sim.R[i]*sim.R[i]*sim.spin[i]*sim.spin[i];
    const lam=(Ti>1e-12)? fmt(sim.params.bM/Ti) : "—";
    ctx.font="10px sans-serif"; ctx.fillStyle="#dfe4ff";
    ctx.fillText(`m=${fmt(sim.m[i])} s=${fmt(sim.spin[i])} T=${fmt(Ti)} λ=${lam} 時計τ/t=${(frac*100).toFixed(1)}%`,8,ch-10);
  }
  if(sim.overlays.rotationCurve) drawRotationCurve();
  if(sim.overlays.tempHistogram) drawTempHistogram();
  if(sim.overlays.spectrum) drawSpectrum();
}

// ===== メインループ =====
let nanNotified=false;
function loop(now){
  const dtms=now-lastFrame; lastFrame=now;
  fpsEMA+= (1000/Math.max(1,dtms)-fpsEMA)*0.05;
  if(running){
    stepAcc+=SUBSTEPS*sim.params.timeScale;
    let k=Math.floor(stepAcc); stepAcc-=k;
    k=Math.min(k,24);
    for(let s2=0;s2<k;s2++) sim.step(DT);
    if((frameCount%30)===0 && sim.hasNaN()){
      running=false; updatePlayBtn();
      notify("数値が発散しました。パラメータを見直すか「⏮ 初めから」を押してください。",4000);
      nanNotified=true;
    }
  }
  render();
  if((frameCount++%10)===0){
    let txt=`t=${sim.t.toFixed(1)}  N=${sim.n}  ${Math.round(fpsEMA)}fps`;
    if(monitorOn){ // 保存量モニタ(T7): P+帳簿P・L+帳簿L+放射L が一定なら保存則成立
      const tt=sim.totals();
      txt+=`\nP=(${fmt(tt.px)}, ${fmt(tt.py)})  L=${fmt(tt.L)}`;
      txt+=`\n帳簿P=(${fmt(sim.resPx)}, ${fmt(sim.resPy)})  帳簿L=${fmt(sim.resL)}  放射L=${fmt(sim.radL)}  放射E=${fmt(sim.radE)}`;
    }
    $("#hud").textContent=txt;
  }
  requestAnimationFrame(loop);
}

function buildParamRows(){
  const host=$("#paramRows"); host.textContent="";
  let curGroup="";
  let groupDiv=null;
  for(const def of PARAM_DEFS){
    if(def.group!==curGroup){ curGroup=def.group;
      groupDiv=document.createElement("div"); groupDiv.className="group";
      const h=document.createElement("h3"); h.textContent=def.group==="法則"?"仮定物理法則":"シミュレーション";
      groupDiv.appendChild(h); host.appendChild(groupDiv); }
    const key=def.key;
    const row=document.createElement("div"); row.className="prow";
    const lab=document.createElement("label"); lab.textContent=def.label;
    const rng=document.createElement("input"); rng.type="range";
    if(def.mode==="log"){ rng.min=0; rng.max=1000; rng.step=1; }
    else { rng.min=def.lo; rng.max=def.hi; rng.step=def.step; }
    rng.value=valToSliderPos(def,sim.params[key]);
    // 直値入力欄(スライダー範囲外の値もバリデータ値域 CLAMPS まで設定可)
    const num=document.createElement("input"); num.type="text"; num.className="valIn";
    num.inputMode="decimal"; num.autocomplete="off"; num.value=fmt(sim.params[key]);
    const setParam=(v)=>{
      const c=CLAMPS[key]; v=clamp(v,c[0],c[1]);
      sim.params[key]=v;
      if(key==="radiusScale") sim.updateRadii();
      return v;
    };
    rng.addEventListener("input",()=>{  // 実行中いつでも即時反映
      let v=parseFloat(rng.value);
      if(def.mode==="log") v=sliderPosToVal(def,v);
      setParam(v);
      num.value=fmt(sim.params[key]);
    });
    num.addEventListener("change",()=>{
      const v=parseFloat(num.value.replace(/[,、\s]/g,""));
      if(isFinite(v)){ const applied=setParam(v); rng.value=valToSliderPos(def,applied); num.value=fmt(applied); }
      else num.value=fmt(sim.params[key]);
    });
    row.appendChild(lab); row.appendChild(rng); row.appendChild(num); groupDiv.appendChild(row);
  }
  // 表示設定
  const disp=document.createElement("div"); disp.className="group";
  const h=document.createElement("h3"); h.textContent="表示"; disp.appendChild(h);
  const toggles=[["trails","軌跡を残す",()=>trailsOn,(v)=>trailsOn=v],
    ["field","決定力マップ",()=>!!sim.overlays.field,(v)=>sim.overlays.field=v],
    ["rotationCurve","回転曲線グラフ",()=>!!sim.overlays.rotationCurve,(v)=>sim.overlays.rotationCurve=v],
    ["tempHistogram","温度グラフ",()=>!!sim.overlays.tempHistogram,(v)=>sim.overlays.tempHistogram=v],
    ["spectrum","スペクトル",()=>!!sim.overlays.spectrum,(v)=>sim.overlays.spectrum=v],
    ["monitor","保存量モニタ(P・L・帳簿)",()=>monitorOn,(v)=>monitorOn=v]];
  toggles.forEach(([id,label,get,set])=>{
    const row=document.createElement("div"); row.className="prow";
    const lab=document.createElement("label"); lab.textContent=label; lab.style.flex="1";
    const cb=document.createElement("input"); cb.type="checkbox"; cb.checked=get();
    cb.addEventListener("change",()=>set(cb.checked));
    row.appendChild(lab); row.appendChild(cb); disp.appendChild(row);
  });
  host.appendChild(disp);
}

}

// ===== AIタブ(実行時LLM: docs/HANDOFF_RUNTIME_LLM.md の焼き込み) =====
const SYSTEM_PROMPT = `あなたは「仮想物理シミュレータ」のプリセット生成器です。ユーザーの要望を読み、下記仕様のシミュレーション設定をJSONで1つだけ出力します。

# シミュレータの物理(要約)
- 2次元。粒子は質量m・位置(x,y)・速度・スピンs(符号付き角速度=熱)を持つ。
- 重力: ニュートン的引力(強さG)。円軌道速度は v=√(G×中心質量÷半径)。
- スピンは熱。高スピン粒子は近接時に斥力(圧力, kRep)を生む。衝突で速度が減衰しスピンに変わる(muF,gammaN)。スピンは近接拡散で平衡化する(kappaS)。
- 空間は質量に引きずられる(kFrame: 0=通常のニュートン力学, 1=完全な相対空間)。背景決定力D0が大きいほど空間が安定する。
- rays を指定すると左端から光線が飛び、質量の近くで曲がる(曲がりの強さと時間の遅れは同じKtで決まり、Ktが小さいほど強い)。
- 原点は画面中央。camera.scale は画面短辺の半分に相当するワールド長。

# 出力ルール
1. スキーマに完全準拠したJSONのみを出力する。説明文やコードフェンスは書かない。
2. physicsは全キーを必ず含める。変更不要なキーは既定値を書く。既定値: G=1, D0=2, kFrame=1, q=2, kRep=1, muF=0.5, gammaN=0.4, kappaS=0.05, Kt=60, radiusScale=1.2, softening=2, timeScale=1
3. 粒子総数は最大600。滑らかに動かすため通常は120〜400にする。
4. 軌道系を作るとき: 中心に single(質量M・pinned:false)を置き、ring/disk は vMode="kepler", aroundMass=M にする。
5. 粒子をばら撒くだけの系(気体など)は world.boundary を "box" か "circle" にし、D0を20以上にすると安定する。重力を弱くするなら G=0.05 程度。
6. name は30字以内、description は200字以内の日本語。emoji は絵文字1文字。
7. 値域(超えると自動修正される): G:0〜100, D0:0〜1000, kFrame:0〜1, q:0.5〜4, kRep:0〜20, muF:0〜1, gammaN:0〜1, kappaS:0〜2, Kt:1〜10000, radiusScale:0.2〜5, softening:0.5〜20, timeScale:0.1〜16, camera.scale:20〜3000, 座標・長さ:±5000, 質量:0.01〜5000, 速度成分:±50, スピン:±20, omega:±2, vNoise:0〜1, vScale:0〜50, rays.n:0〜64

# ジェネレータ(bodiesの要素。typeごとに全フィールド必須)
- single: {type,m,x,y,vx,vy,spin,pinned} — 粒子1個。pinned:true で力を受けず固定。
- ring: {type,n,cx,cy,rIn,rOut,mMin,mMax,spinMin,spinMax,vMode,aroundMass,omega,vNoise,direction,pinned} — 半径rIn〜rOutの環にn個。vMode: "kepler"(aroundMassの周りを公転)|"omega"(v=omega×r)|"none"。direction: 1=反時計,-1=時計。
- disk: {type,n,cx,cy,radius,mMin,mMax,spinMin,spinMax,vMode,aroundMass,vScale,direction} — 半径radiusの円盤にn個。vMode: "kepler"(vScaleは倍率,通常1)|"rigid"(vScale=角速度)|"flat"(vScale=一定速さ)|"random"(vScale=速さ)|"none"。
- box: {type,n,cx,cy,w,h,mMin,mMax,spinMin,spinMax,vScale} — 幅w高さhの矩形にn個、ランダム方向に速さ〜vScale。

# 例
例1 要望「連星と、その周りを回る惑星たち」
{"name":"連星系の惑星たち","emoji":"⭐","description":"2つの恒星が共通重心を回り、その外側を小さな惑星たちが公転する。連星の複雑な重力場で軌道が乱される様子が見どころ。","camera":{"scale":320},"world":{"boundary":"none","size":0},"physics":{"G":1,"D0":2,"kFrame":1,"q":2,"kRep":1,"muF":0.5,"gammaN":0.4,"kappaS":0.05,"Kt":60,"radiusScale":1.2,"softening":2,"timeScale":4},"bodies":[{"type":"single","m":500,"x":-60,"y":0,"vx":0,"vy":-1.44,"spin":0.5,"pinned":false},{"type":"single","m":500,"x":60,"y":0,"vx":0,"vy":1.44,"spin":0.5,"pinned":false},{"type":"ring","n":220,"cx":0,"cy":0,"rIn":180,"rOut":290,"mMin":0.05,"mMax":0.3,"spinMin":0,"spinMax":0,"vMode":"kepler","aroundMass":1000,"omega":0,"vNoise":0.05,"direction":1,"pinned":false}],"overlays":{"rotationCurve":false,"tempHistogram":false,"field":false}}

// 注: 以前は output_config.format(構造化出力)に JSON Schema を渡していたが、
// スキーマが大きく「The compiled grammar is too large」(400) となるため撤去した。
// 出力形式は few-shot + 下記の JSON 抽出 + validatePreset(検証→リトライ→フォールバック)で担保する。
// (docs/HANDOFF_RUNTIME_LLM.md 改訂 2026-07-13)
function extractJSON(text){
  let t=String(text).trim();
  const f=t.indexOf("{"), l=t.lastIndexOf("}");
  if(f>=0 && l>f) t=t.slice(f,l+1);   // 前後の説明文・コードフェンスを除去
  return t;
}

async function callClaude(model, messages){
  const key=localStorage.getItem("hp_key")||"";
  const body={ model, max_tokens:4000, system:SYSTEM_PROMPT, messages };
  if(model.indexOf("sonnet")>=0 || model.indexOf("opus")>=0) body.thinking={type:"disabled"};
  let resp;
  try{
    resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{ "content-type":"application/json", "x-api-key":key,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true" },
      body:JSON.stringify(body) });
  }catch(e){ throw new Error("ネットワークに接続できません"); }
  if(!resp.ok){
    if(resp.status===401) throw new Error("APIキーが無効です");
    if(resp.status===429||resp.status===529) throw new Error("混雑しています。しばらく待って再試行してください");
    let msg=""; try{ const j=await resp.json(); msg=j.error&&j.error.message||""; }catch(e){}
    throw new Error("APIエラー("+resp.status+") "+msg.slice(0,120));
  }
  const data=await resp.json();
  if(data.stop_reason==="refusal") throw new Error("生成が拒否されました。要望の表現を変えてみてください");
  if(data.stop_reason==="max_tokens") throw new Error("生成が長すぎました。要望を簡潔にしてください");
  const block=(data.content||[]).find(b=>b.type==="text");
  if(!block) throw new Error("応答が空でした");
  return block.text;
}

// 段構え: Haiku → 検証NG時リトライ1回 → Sonnet 5 フォールバック(HANDOFF_RUNTIME_LLM.md)
async function generatePreset(userText, model, onStage){
  const attempt=async (mdl, messages)=>{
    const text=await callClaude(mdl, messages);
    let obj;
    try{ obj=JSON.parse(extractJSON(text)); }catch(e){ return {fail:"JSONとして解釈できませんでした", raw:text}; }
    const v=validatePreset(obj);
    if(!v.ok) return {fail:v.errors.join(" / "), raw:text};
    return {preset:v.preset, warnings:v.warnings};
  };
  const baseMsgs=[{role:"user",content:userText}];
  onStage("生成中("+model+")…");
  let r=await attempt(model, baseMsgs);
  if(r.preset) return r;
  onStage("検証エラーを修正して再試行中…");
  const retryMsgs=[{role:"user",content:userText},
    {role:"assistant",content:r.raw},
    {role:"user",content:"あなたの出力に検証エラーがあります: "+r.fail+"。同じ要望に対し、エラーを修正した完全なJSONを出力してください。"}];
  r=await attempt(model, retryMsgs);
  if(r.preset) return r;
  const fb=(model==="claude-haiku-4-5")?"claude-sonnet-5":"claude-opus-4-8";
  onStage("上位モデル("+fb+")にフォールバック中…");
  r=await attempt(fb, baseMsgs);
  if(r.preset) return r;
  throw new Error("生成に失敗しました: "+r.fail);
}

// ===== タッチ/マウス操作(パン・ピンチ・タップ選択) =====
(function(){
  let touches=new Map(), lastDist=0, moved=false, downX=0, downY=0;
  const pos=(t)=>({x:t.clientX,y:t.clientY});
  cv.addEventListener("touchstart",(e)=>{ e.preventDefault();
    for(const t of e.changedTouches) touches.set(t.identifier,pos(t));
    if(touches.size===1){ moved=false; const p=[...touches.values()][0]; downX=p.x; downY=p.y; }
    if(touches.size===2){ const a=[...touches.values()]; lastDist=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y); }
  },{passive:false});
  cv.addEventListener("touchmove",(e)=>{ e.preventDefault();
    for(const t of e.changedTouches){ if(touches.has(t.identifier)){
      const prev=touches.get(t.identifier), cur=pos(t);
      if(touches.size===1){
        camX-=(cur.x-prev.x)/zoom(); camY-=(cur.y-prev.y)/zoom();
        if(Math.abs(cur.x-downX)+Math.abs(cur.y-downY)>8) moved=true;
      }
      touches.set(t.identifier,cur);
    }}
    if(touches.size===2){ const a=[...touches.values()];
      const d=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);
      if(lastDist>0) camScale=clamp(camScale*lastDist/d,20,3000);
      lastDist=d; moved=true; }
  },{passive:false});
  cv.addEventListener("touchend",(e)=>{ e.preventDefault();
    for(const t of e.changedTouches) touches.delete(t.identifier);
    if(touches.size<2) lastDist=0;
    if(touches.size===0 && !moved) tapSelect(downX,downY);
  },{passive:false});
  // マウス
  let mdown=false,mx=0,my=0,mmoved=false;
  cv.addEventListener("mousedown",e=>{mdown=true;mx=e.clientX;my=e.clientY;mmoved=false;});
  window.addEventListener("mousemove",e=>{ if(!mdown)return;
    camX-=(e.clientX-mx)/zoom(); camY-=(e.clientY-my)/zoom();
    if(Math.abs(e.clientX-mx)+Math.abs(e.clientY-my)>4)mmoved=true; mx=e.clientX;my=e.clientY; });
  window.addEventListener("mouseup",e=>{ if(mdown&&!mmoved) tapSelect(e.clientX,e.clientY); mdown=false; });
  cv.addEventListener("wheel",e=>{ e.preventDefault();
    camScale=clamp(camScale*(e.deltaY>0?1.1:0.9),20,3000); },{passive:false});
  function tapSelect(px,py){
    const rect=cv.getBoundingClientRect();
    const wx=camX+((px-rect.left)-cw/2)/zoom(), wy=camY+((py-rect.top)-ch/2)/zoom();
    let best=-1,bd=(30/zoom())*(30/zoom());
    for(let i=0;i<sim.n;i++){ const dx=sim.x[i]-wx,dy=sim.y[i]-wy,d2=dx*dx+dy*dy;
      if(d2<bd){bd=d2;best=i;} }
    selIdx=(best===selIdx)?-1:best;
  }
})();

// ===== 検証フック HP.verify(V1/V2/V6/V8/V9/V10/V11/V12/V13/V16。品質ゲートが使用) =====
// V3〜V5・V7 は長時間の数値実験のため自動テスト列に含めない(HANDOFF_IMPLEMENTATION.md 付録B B5)。
// V6 は v1.8 で符号裁定を恒久化する縮小版を自動化(多惑星スケーリング・D₀遮蔽は手動のまま)
const VERIFY = {
  // V1: T7 保存則。D₀=0・pinnedなし・全相互作用ONで1000ステップ、|ΔP|/P_scale・|ΔL|/L_scale < 1e-3
  v1(){
    const s=makeSim();
    s.build({ id:"verify_v1", name:"V1", camera:{scale:200}, world:{boundary:"none",size:0},
      physics:{D0:0, kFrame:1, G:1, kRep:1, muF:0.5, gammaN:0.4, kappaS:0.05, etaRad:0,
        softening:2, timeScale:1},
      bodies:[
        {type:"single", m:30, x:0, y:0, vx:0, vy:0, spin:0.5, pinned:false},
        {type:"disk", n:48, cx:0, cy:0, radius:120, mMin:0.5, mMax:2,
         spinMin:-2, spinMax:2, vMode:"random", aroundMass:0, vScale:1.2, direction:1}
      ],
      overlays:{} });
    const t0=s.totals();
    let pScale=0, lScale=0;
    for(let i=0;i<s.n;i++){
      pScale+=s.m[i]*Math.hypot(s.vx[i],s.vy[i]);
      lScale+=Math.abs(s.m[i]*(s.x[i]*s.vy[i]-s.y[i]*s.vx[i]))
             +0.5*s.m[i]*s.R[i]*s.R[i]*Math.abs(s.spin[i]);
    }
    for(let k=0;k<1000;k++) s.step(DT);
    const t1=s.totals();
    // 恒等式(T7): P+帳簿P・L+帳簿L+放射L が一定(D₀=0 なら帳簿は 0 のまま)
    const relP=Math.hypot(t1.px+s.resPx-t0.px, t1.py+s.resPy-t0.py)/Math.max(pScale,1e-9);
    const relL=Math.abs(t1.L+s.resL+s.radL-t0.L)/Math.max(lScale,1e-9);
    const pass=relP<1e-3 && relL<1e-3;
    return {id:"V1", pass, value:Math.max(relP,relL),
      detail:`|ΔP|/P_scale=${relP.toExponential(2)} |ΔL|/L_scale=${relL.toExponential(2)} (< 1e-3)`};
  },
  // V2: D1 分光温度計。既知 s の粒子の λ=b_m/T から s を逆算、相対誤差 < 5%
  v2(){
    const rs=DEFAULT_PHYSICS.radiusScale, bM=DEFAULT_PHYSICS.bM;
    const mM=2, Rr=rs*Math.sqrt(mM), Ii=0.5*mM*Rr*Rr, sTrue=1.7;
    const T=Ii*sTrue*sTrue, lam=bM/T;              // 放射色(E11)
    const sBack=Math.sqrt(bM/(Ii*lam));            // D1: s(λ)=√(b_m/(I·λ))
    const err=Math.abs(sBack-sTrue)/sTrue;
    return {id:"V2", pass:err<0.05, value:err,
      detail:`s=${sTrue} → λ=${lam.toExponential(3)} → s'=${sBack.toFixed(4)} 相対誤差=${err.toExponential(2)} (< 5%)`};
  },
  // V6: E6′ 近点移動の符号(v1.8)。第3次レビューで旧 DERIVATIONS §5(a)「順行で前進」と
  // ChatGPT 連続極限解析「順行で後退」が矛盾 → 機械実験で後者を確認し(D4a′ に訂正)、
  // 本フックが裁定を恒久化する: 順行軌道+順行スピン(kF>0)で近点は「後退」し、
  // スピン反転で「前進」へ反転、kF=0 対照は数値ベースライン(Plummer+離散化)のみ。
  v6(){
    const run=(S,kf)=>{
      const s=makeSim();
      s.build({ id:"verify_v6", name:"V6", camera:{scale:200}, world:{boundary:"none",size:0},
        physics:{G:1, D0:0.05, kFrame:kf, q:2, kRep:0, muF:0, gammaN:0, kappaS:0, etaRad:0,
          Kt:60, cLight:60, softening:2, timeScale:1},
        bodies:[
          {type:"single", m:150, x:0, y:0, vx:0, vy:0, spin:S, pinned:true},
          {type:"single", m:0.01, x:30, y:0, vx:0, vy:Math.sqrt(150*1.5/30), spin:0, pinned:false}
        ], overlays:{} });   // a=60, e=0.5(近点30・遠点90)の順行軌道
      const peri=[]; let lastK=-1e9, r2=0, r1=0, th1=0;
      for(let k=0;k<140000 && peri.length<4;k++){
        s.step(DT);
        const r=Math.hypot(s.x[1],s.y[1]), th=Math.atan2(s.y[1],s.x[1]);
        // 真の近点のみ受理(遠点近傍では dr/步→0 で Float32 偽極小が出るため r<50 ゲート+最小間隔)
        if(k>2 && r1<r2 && r1<r && r1<50 && (k-lastK)>4000){ peri.push(th1); lastK=k; }
        r2=r1; r1=r; th1=th;
      }
      let acc=0;
      for(let i=1;i<peri.length;i++){
        let dd=peri[i]-peri[i-1];
        while(dd>Math.PI) dd-=2*Math.PI; while(dd<-Math.PI) dd+=2*Math.PI;
        acc+=dd;
      }
      return {n:peri.length, drift: peri.length>1 ? acc/(peri.length-1) : 0}; // rad/周
    };
    const P=run(0.05,1), M=run(-0.05,1), Z=run(0.05,0);
    const base=Math.abs(Z.drift);
    const pass = P.n>=3 && M.n>=3 && Z.n>=3 &&
      P.drift < -3*base &&   // 順行+S>0: 対照の3倍を超えて「後退」
      M.drift > +3*base;     // スピン反転で「前進」へ符号反転
    const f=(x)=>(x*180/Math.PI).toFixed(2);
    return {id:"V6", pass, value:P.drift,
      detail:`Δϖ/周: S=+0.05→${f(P.drift)}°(後退) S=−0.05→${f(M.drift)}°(前進) 対照kF=0→${f(Z.drift)}°(実測基準: −7.5/+10.7/−1.0)`};
  },
  // V8: T8 非対称レンズ。±S_c で上下対称光線の湾曲角の和(非対称度)の符号が反転すること
  // v1.7: kLens 廃止に伴い Kt=500(2/Kt=0.004 で旧 kLens=0.004 と湾曲係数が厳密等価)
  v8(){
    const mk=(sp)=>{ const s=makeSim();
      s.build({ id:"verify_v8", name:"V8", camera:{scale:300}, world:{boundary:"none",size:0},
        physics:{cLight:60, D0:2, kFrame:1, G:1, Kt:500, softening:2, timeScale:1},
        bodies:[{type:"single", m:1500, x:0, y:0, vx:0, vy:0, spin:sp, pinned:true}],
        overlays:{} });
      return s; };
    const bend=(s,y0)=>{ const r=traceRay(s,-300,y0,1,0,2.7,320,null); return Math.atan2(r.cy,r.cx); };
    const asym=(s)=>bend(s,90)+bend(s,-90);  // 対称なら 0(上下の湾曲角が逆符号で相殺)
    const aP=asym(mk(0.5)), aM=asym(mk(-0.5));
    const pass=(Math.sign(aP)!==Math.sign(aM)) && Math.abs(aP)>1e-4 && Math.abs(aM)>1e-4;
    return {id:"V8", pass, value:Math.abs(aP),
      detail:`非対称度 Δθ(+0.5)=${aP.toExponential(3)} rad / Δθ(−0.5)=${aM.toExponential(3)} rad(符号反転かつ |Δθ|>1e-4)`};
  },
  // V9: A6 厳密性(v1.5 付録F)。エンジンの W 数値勾配 × G が E4 加速度と一致すること
  // (E1′=Plummer 型で厳密成立。旧式 w=m/(d+ε) では近距離で ~25% 乖離し FAIL する)
  v9(){
    const G=1, h=0.01;
    const mk=(px,py)=>{ const s=makeSim();
      s.build({ id:"verify_v9", name:"V9", camera:{scale:200}, world:{boundary:"none",size:0},
        physics:{G:G, D0:2, kFrame:0, kRep:0, muF:0, gammaN:0, kappaS:0, etaRad:0,
          softening:2, timeScale:1},
        bodies:[
          {type:"single", m:50, x:0, y:0, vx:0, vy:0, spin:0, pinned:true},
          {type:"single", m:20, x:18, y:-7, vx:0, vy:0, spin:0, pinned:true},
          {type:"single", m:0.01, x:px, y:py, vx:0, vy:0, spin:0, pinned:true}
        ],
        overlays:{} });
      s.step(DT);  // pinned でも①全対ループで ax/ay/sumW は充填される
      return s; };
    const pts=[[10,0],[-14,6],[40,25]];
    let worst=0; const parts=[];
    for(const [px,py] of pts){
      const c=mk(px,py);
      const gx=(mk(px+h,py).sumW[2]-mk(px-h,py).sumW[2])/(2*h);
      const gy=(mk(px,py+h).sumW[2]-mk(px,py-h).sumW[2])/(2*h);
      const err=Math.hypot(c.ax[2]-G*gx, c.ay[2]-G*gy)/Math.max(Math.hypot(c.ax[2],c.ay[2]),1e-12);
      if(err>worst) worst=err;
      parts.push(`(${px},${py})=${err.toExponential(1)}`);
    }
    return {id:"V9", pass:worst<1e-3, value:worst,
      detail:`|a−G∇W|/|a| 最大=${worst.toExponential(2)} (< 1e-3) ${parts.join(" ")}`};
  },
  // V10: 第一法則の完全閉性(v1.5 付録F、A12′)。保存力+散逸4チャネル(γn・接線摩擦・
  // E10′同期・E11冷却)の系で E_総+radE が一定。帳簿漏れがあると FAIL する
  v10(){
    const s=makeSim();
    s.build({ id:"verify_v10", name:"V10", camera:{scale:200}, world:{boundary:"none",size:0},
      physics:{G:1, D0:0, kFrame:0, kRep:0, muF:0.5, gammaN:0.4, kappaS:0.3, etaRad:2e-4,
        pRad:1, softening:2, timeScale:1},
      bodies:[
        {type:"single", m:30, x:0, y:0, vx:0, vy:0, spin:0.8, pinned:false},
        {type:"disk", n:36, cx:0, cy:0, radius:55, mMin:1, mMax:2,
         spinMin:-1.5, spinMax:1.5, vMode:"random", aroundMass:0, vScale:0.6, direction:1}
      ],
      overlays:{} });
    const energyOf=(s)=>{
      const eps2=s.params.softening*s.params.softening, G=s.params.G;
      let E=0;
      for(let i=0;i<s.n;i++){
        E+=0.5*s.m[i]*(s.vx[i]*s.vx[i]+s.vy[i]*s.vy[i]);
        E+=0.25*s.m[i]*s.R[i]*s.R[i]*s.spin[i]*s.spin[i];      // ½·I·s²、I=½mR²
      }
      for(let i=0;i<s.n;i++) for(let j=i+1;j<s.n;j++){
        const dx=s.x[i]-s.x[j], dy=s.y[i]-s.y[j], d2=dx*dx+dy*dy, d=Math.sqrt(d2);
        E-=G*s.m[i]*s.m[j]/Math.sqrt(d2+eps2);                  // E4 の厳密なポテンシャル(E1′)
        const sumR=s.R[i]+s.R[j];
        if(d<sumR){                                             // 法線ばね(力キャップは d のみの関数=保存力)
          const muM=s.m[i]*s.m[j]/(s.m[i]+s.m[j]);
          const maxInv=Math.max(1/s.m[i],1/s.m[j]);
          const xO=sumR-d, xC=8/(maxInv*40*muM);
          E+=(xO<=xC)? 20*muM*xO*xO : 20*muM*xC*xC+(8/maxInv)*(xO-xC);
        }
      }
      return E;
    };
    let Escale=1;
    for(let i=0;i<s.n;i++) Escale+=0.5*s.m[i]*(s.vx[i]*s.vx[i]+s.vy[i]*s.vy[i])
      +0.25*s.m[i]*s.R[i]*s.R[i]*s.spin[i]*s.spin[i];
    for(let i=0;i<s.n;i++) for(let j=i+1;j<s.n;j++){
      const dx=s.x[i]-s.x[j], dy=s.y[i]-s.y[j];
      Escale+=s.params.G*s.m[i]*s.m[j]/Math.sqrt(dx*dx+dy*dy+s.params.softening*s.params.softening);
    }
    const E0=energyOf(s)+s.radE;
    for(let k=0;k<1000;k++) s.step(DT);
    const E1=energyOf(s)+s.radE;
    const resid=Math.abs(E1-E0)/Escale;
    // 閾値 7.5e-4 = 実測残差 2.48e-4 × 3(付録F 書き戻し規約。修正前は 1.87e-1 で FAIL)
    return {id:"V10", pass:resid<7.5e-4, value:resid,
      detail:`|ΔE_総+radE|/E_scale=${resid.toExponential(2)} (< 7.5e-4) radE=${s.radE.toFixed(3)}`};
  },
  // V11: T4 の因果性(v1.5 付録F)。同一初期条件の kFrame=0/1 A/B 比較で、
  // 外側の平均回転が kFrame=1 側でのみ増速すること(平坦化の因果が kFrame にあることの検証)。
  // 付録F 追記(2026-07-16): 原定義(R260・800步・終値判定)は T4 連鎖(減速→落下→スピンアップ)の
  // 力学時間に対し窓が短くゲインが負。縮小銀河(R130、力学時間 2.4×短縮)+D0 0.5+
  // 時間平均ゲイン(1000〜2000步を100步毎に採取)に改訂。実測プラトー 0.055±0.007 に対し閾値 0.03
  v11(){
    const preset=(kf)=>({ id:"verify_v11", name:"V11", camera:{scale:300}, world:{boundary:"none",size:0},
      physics:{G:1, D0:0.5, kFrame:kf, muF:0.02, gammaN:0.05, kRep:1.0, kappaS:0.05,
        softening:4, timeScale:1},
      bodies:[
        {type:"single", m:600, x:0, y:0, vx:0, vy:0, spin:0.05, pinned:false},
        {type:"disk", n:140, cx:0, cy:0, radius:130, mMin:0.5, mMax:1.2,
         spinMin:0, spinMax:0, vMode:"kepler", aroundMass:600, vScale:1.05, direction:1}
      ],
      overlays:{} });
    const A=makeSim(); A.build(preset(1));
    const B=makeSim(); B.build(preset(0));
    ["m","x","y","vx","vy","spin"].forEach(k=>{ B[k].set(A[k].subarray(0,A.n)); }); // 初期条件の同一化
    B.updateRadii();
    const meanVphiOuter=(s)=>{ let sum=0,c=0;   // 帯域 [0.65,1.0]×130
      for(let i=0;i<s.n;i++){ const r=Math.hypot(s.x[i],s.y[i]);
        if(r>=85&&r<=130){ sum+=(s.x[i]*s.vy[i]-s.y[i]*s.vx[i])/r; c++; } }
      return c? sum/c : 0; };
    const vRef=meanVphiOuter(A);
    let acc=0, cnt=0;
    for(let k=1;k<=2000;k++){ A.step(DT); B.step(DT);
      if(k>=1000 && (k%100)===0){ acc+=meanVphiOuter(A)-meanVphiOuter(B); cnt++; } }
    const gain=acc/(cnt*vRef), drift=Math.abs(meanVphiOuter(B)-vRef)/vRef;
    return {id:"V11", pass:(gain>=0.03 && drift<=0.10), value:gain,
      detail:`時間平均gain=${gain.toFixed(3)} (≥0.03) / |g0−vRef|/vRef=${drift.toFixed(3)} (≤0.10)`};
  },
  // V12: E7R 運動時間遅れ(v1.7)。ほぼ一様な背景中で v/c₀ = 0, 0.3, 0.6 の時計を同一 t
  // 進め、τ/t = √(1−|v−u|²/c₀²) と一致すること(Kt=1e6 で重力項を消し、粒子間は遠隔配置)
  v12(){
    const s=makeSim();
    s.build({ id:"verify_v12", name:"V12", camera:{scale:200}, world:{boundary:"none",size:0},
      physics:{G:0, D0:2, kFrame:0, kRep:0, muF:0, gammaN:0, kappaS:0, etaRad:0,
        Kt:1e6, cLight:60, softening:2, timeScale:1},
      bodies:[
        {type:"single", m:1, x:0, y:-1500, vx:0,  vy:0, spin:0, pinned:false},
        {type:"single", m:1, x:0, y:0,     vx:18, vy:0, spin:0, pinned:false},
        {type:"single", m:1, x:0, y:1500,  vx:36, vy:0, spin:0, pinned:false}
      ], overlays:{} });
    for(let k=0;k<1000;k++) s.step(DT);
    let worst=0; const parts=[];
    [0,18,36].forEach((v,i)=>{
      const th=Math.sqrt(1-(v*v)/(60*60));
      const err=Math.abs(s.tau[i]/s.t-th)/th;
      if(err>worst) worst=err;
      parts.push(`v=${v}:τ/t=${(s.tau[i]/s.t).toFixed(4)}(理論${th.toFixed(4)})`);
    });
    return {id:"V12", pass:worst<1e-3, value:worst,
      detail:`最大相対誤差=${worst.toExponential(2)} (< 1e-3) ${parts.join(" ")}`};
  },
  // V13: E7R 重力+運動の合成(v1.7)。静的中心場の円軌道時計が解析値
  // √(N²−A²v²/c₀²)(ψ=(D₀+w_c)/Kt)と一致すること。プローブは重い(m=25)ので、
  // 自己場が時計に混入する回帰(ψ に +m/ε/Kt≈0.21)があれば即 FAIL する(V17 相当を兼務)
  v13(){
    const M=200, r0=80, G=1, Kt=60, c0=5, D0=2;
    const s=makeSim();
    s.build({ id:"verify_v13", name:"V13", camera:{scale:200}, world:{boundary:"none",size:0},
      physics:{G:G, D0:D0, kFrame:0, kRep:0, muF:0, gammaN:0, kappaS:0, etaRad:0,
        Kt:Kt, cLight:c0, softening:2, timeScale:1},
      bodies:[
        {type:"single", m:M,  x:0,  y:0, vx:0, vy:0, spin:0, pinned:true},
        {type:"single", m:25, x:r0, y:0, vx:0, vy:0, spin:0, pinned:false}
      ], overlays:{} });
    const eps=s.params.softening;
    const v=Math.sqrt(G*M*r0*r0/Math.pow(r0*r0+eps*eps,1.5)); // Plummer 場の厳密な円軌道速度
    s.vy[1]=v;
    for(let k=0;k<1000;k++) s.step(DT);
    const psi=(D0+M/Math.sqrt(r0*r0+eps*eps))/Kt;
    const N=Math.exp(-psi), A=Math.exp(psi);
    const th=Math.sqrt(N*N-A*A*v*v/(c0*c0));
    const err=Math.abs(s.tau[1]/s.t-th)/th;
    return {id:"V13", pass:err<1e-3, value:err,
      detail:`τ/t=${(s.tau[1]/s.t).toFixed(4)} 解析値=${th.toFixed(4)} 相対誤差=${err.toExponential(2)} (< 1e-3)`};
  },
  // V16: T9 双子時計(v1.7)。一様背景中の静止時計 A と円周回時計 B(レール、v=0.5c₀)で
  // τ_B < τ_A、双方が解析値と一致し、B の時計に不連続(1ステップの飛び)がないこと
  v16(){
    const Kt=60, c0=60, D0=2, rB=400, om=0.075; // |v_B| = om·rB = 30 = 0.5c₀
    const s=makeSim();
    s.build({ id:"verify_v16", name:"V16", camera:{scale:200}, world:{boundary:"none",size:0},
      physics:{G:0, D0:D0, kFrame:0, kRep:0, muF:0, gammaN:0, kappaS:0, etaRad:0,
        Kt:Kt, cLight:c0, softening:2, timeScale:1},
      bodies:[
        {type:"single", m:1, x:0, y:0, vx:0, vy:0, spin:0, pinned:true},
        {type:"ring", n:1, cx:0, cy:0, rIn:rB, rOut:rB, mMin:1, mMax:1, spinMin:0, spinMax:0,
         vMode:"omega", aroundMass:0, omega:om, vNoise:0, direction:1, pinned:true}
      ], overlays:{} });
    let prev=0, jmin=Infinity, jmax=0;
    for(let k=0;k<1000;k++){ s.step(DT);
      const j=s.tau[1]-prev; prev=s.tau[1];
      if(j<jmin) jmin=j; if(j>jmax) jmax=j; }
    const psi=(D0+1/rB)/Kt, N=Math.exp(-psi), A=Math.exp(psi);
    const vB=om*rB;
    const thB=Math.sqrt(N*N-A*A*vB*vB/(c0*c0)), thA=N;
    const errB=Math.abs(s.tau[1]/s.t-thB)/thB;
    const errA=Math.abs(s.tau[0]/s.t-thA)/thA;
    // 一定レート・非負=不連続なし。閾値 1e-5 は Float32 τ 累積の量子化(≈ε₃₂·τ≈2e-6)を
    // 許容しつつ、同期切替型のジャンプ(O(0.1) 以上)を確実に検出する
    const cont=(jmax-jmin)<1e-5 && jmin>0;
    const pass=(s.tau[1]<s.tau[0]) && errB<1e-3 && errA<1e-3 && cont;
    return {id:"V16", pass, value:Math.max(errA,errB),
      detail:`τB/t=${(s.tau[1]/s.t).toFixed(4)}(解析${thB.toFixed(4)}) τA/t=${(s.tau[0]/s.t).toFixed(4)}(解析${thA.toFixed(4)}) τB<τA=${s.tau[1]<s.tau[0]} 步幅変動=${(jmax-jmin).toExponential(1)}`};
  },
  all(){ return [this.v1(), this.v2(), this.v6(), this.v8(), this.v9(), this.v10(), this.v11(),
                 this.v12(), this.v13(), this.v16()]; }
};

// ===== デバッグ/テスト用フック(品質ゲートが使用) =====
window.HP = { sim, loadPreset, allPresets, validatePreset, SYSTEM_PROMPT, extractJSON,
  verify:VERIFY, traceRay,
  running:()=>running, setRunning:(v)=>{running=v;updatePlayBtn();},
  tick:(frames)=>{ for(let f=0;f<frames;f++){ const k=Math.max(1,Math.round(SUBSTEPS*sim.params.timeScale)); for(let s2=0;s2<Math.min(k,24);s2++) sim.step(DT); } render(); } };

// ===== 起動 =====
$("#apiKey").value=localStorage.getItem("hp_key")||"";
$("#aiModel").value=localStorage.getItem("hp_model")||"claude-haiku-4-5";
rebuildPresetSelect();
resizeCanvas();
loadPreset("saturn",false);
requestAnimationFrame((t)=>{lastFrame=t;requestAnimationFrame(loop);});
</script>
